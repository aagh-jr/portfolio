<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Abel Angel</title>
  <style>
    .nav-pill {
      position: fixed; top: 16px; right: 48px; z-index: 300;
      display: flex; align-items: center; gap: 16px; padding: 8px;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.15s; text-decoration: none;
    }
    .nav-btn.active { box-shadow: 0 0 0 2px rgba(0,0,0,0.22); }
    @media (max-width: 768px) { .nav-pill { right: 20px; } }
    body { background: #ffffff; transition: opacity 0.3s ease-in-out; }
    body.page-entering, body.page-leaving { opacity: 0; }
    .back-link {
      position: fixed; top: 24px; left: 24px; z-index: 200;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px 10px 14px;
      border-radius: 9999px;
      background: rgba(0,0,0,0.04);
      color: #71717a;
      font-family: 'Manrope', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: -0.01em;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }
    .back-link:hover {
      background: rgba(0,0,0,0.08); color: #1c1c18;
      transform: translateX(-2px);
    }
    .back-link svg { display: block; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <a href="index.html" class="back-link" aria-label="Back to home">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Contact</span>
  </a>
  <nav class="nav-pill" aria-label="Site navigation">
    <a href="contact.html" class="nav-btn active" title="Contact" style="color:#141414">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 5.5L8 9.5L14 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </a>
  </nav>
  <p>Contact page — coming soon.</p>
  <script>
    (function() {
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    })();
  </script>
</body>
</html>
