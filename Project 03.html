<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project 03 — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf9f6; font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
  
    .nav-pill {
      position: fixed; top: 16px; right: 48px; z-index: 300;
      display: flex; align-items: center; gap: 16px; padding: 8px;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.15s; text-decoration: none;
    }
    .nav-btn.active { box-shadow: 0 0 0 1.5px rgba(0,0,0,0.22); }
    @media (max-width: 768px) { .nav-pill { right: 20px; } }
  </style>
</head>
<body>
  <nav class="nav-pill" aria-label="Site navigation">
    <a href="contact.html" class="nav-btn" title="Contact" style="color:#71717a">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 5.5L8 9.5L14 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </a>
  </nav>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    const PROJECTS = [
      { id: 1, title: 'Energy Ave.', year: '2024', href: 'Energy Ave.html', available: true },
      { id: 2, title: 'Project 03', year: null, href: 'Project 03.html', available: false },
      { id: 3, title: 'Project 03', year: null, href: 'Project 03.html', available: false },
      { id: 4, title: 'Project 04', year: null, href: 'Project 04.html', available: false },
    ];

    const ProjectsCard = () => {
      const cardBg = '#f6f3ed';
      const currentFile = decodeURIComponent(window.location.pathname.split('/').pop());
      return (
        <div style={{
          position: 'fixed', top: '50%', left: 24, transform: 'translateY(-50%)',
          width: 220, maxHeight: '80vh', background: cardBg,
          borderRadius: 20, border: '1px solid rgba(0,0,0,0.07)',
          display: 'flex', flexDirection: 'column', overflow: 'hidden',
          boxShadow: '0 4px 24px rgba(0,0,0,0.06)', zIndex: 100,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 18px 14px', borderBottom: '1px solid rgba(0,0,0,0.07)' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: '#141414', letterSpacing: '-0.01em' }}>Projects</span>
            <a href="index.html" style={{ background: 'rgba(0,0,0,0.07)', borderRadius: 100, width: 22, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, transition: 'background 0.15s' }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(0,0,0,0.13)'}
              onMouseLeave={e => e.currentTarget.style.background = 'rgba(0,0,0,0.07)'}>
              <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 1L7 7M7 1L1 7" stroke="#141414" strokeWidth="1.3" strokeLinecap="round"/></svg>
            </a>
          </div>
          <div style={{ padding: '8px 10px', flex: 1, overflowY: 'auto' }}>
            {PROJECTS.map((p) => {
              const isActive = currentFile === p.href;
              return (
                <a key={p.id} href={p.href} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '11px 12px', borderRadius: 12, background: isActive ? 'rgba(0,0,0,0.06)' : 'transparent', marginBottom: 2, cursor: 'pointer', textDecoration: 'none', transition: 'background 0.15s' }}
                  onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = 'rgba(0,0,0,0.03)'; }}
                  onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: isActive ? 700 : 400, color: p.available ? '#141414' : '#b8b8b0', letterSpacing: '-0.015em', lineHeight: 1.2, marginBottom: 2 }}>{p.title}</div>
                    <div style={{ fontSize: 11, color: '#a8a8a0' }}>{p.available ? p.year : 'Coming soon'}</div>
                  </div>
                  {isActive && <div style={{ width: 5, height: 5, borderRadius: '50%', background: '#141414', flexShrink: 0 }} />}
                </a>
              );
            })}
          </div>
        </div>
      );
    };

    const Page = () => (
      <>
        <ProjectsCard />
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', paddingLeft: 260, paddingRight: 48 }}>
          <div style={{ textAlign: 'center', maxWidth: 480 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#c0c0b8', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 20 }}>03</div>
            <h1 style={{ fontSize: 56, fontWeight: 700, color: '#d8d8d0', letterSpacing: '-0.025em', lineHeight: 1, marginBottom: 16, fontFamily: 'Manrope, sans-serif' }}>Project 03</h1>
            <p style={{ fontSize: 15, color: '#c8c8c0', lineHeight: 1.6 }}>Coming soon</p>
          </div>
        </div>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  </script>
</body>
</html>
