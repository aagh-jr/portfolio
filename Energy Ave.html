<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Ave — UX Research Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #FAFAF7;
      --ink: #141413;
      --rust: #B5462E;
      --rule: rgba(20, 20, 19, 0.09);
      --font: 'Manrope', 'DM Sans', system-ui, sans-serif;
      --serif: 'Fraunces', 'Lora', Georgia, serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font);
      font-size: 17px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.045;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    ::selection { background: rgba(182,194,254,0.25); color: var(--ink); }
    button { font-family: var(--font); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

    /* Page transitions */
    body { transition: opacity 0.3s ease-in-out; }
    body.page-entering, body.page-leaving { opacity: 0; }

    body.is-embed .nav-pill { display: none !important; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; }
    td { vertical-align: middle; }
  </style>
</head>
<body>

  <div id="root"></div>
  <script type="text/babel" src="ea-shared.jsx"></script>
  <script type="text/babel" src="ea-sections-1.jsx"></script>
  <script type="text/babel" src="ea-sections-2.jsx"></script>
  <script type="text/babel" src="ea-sections-3.jsx"></script>
  <script type="text/babel" src="ea-sections-4.jsx"></script>
  <script type="text/babel" src="ea-app.jsx"></script>

  <script>
    (function() {
      // Mark body when loaded as an embedded iframe so CSS can hide chrome
      if (new URLSearchParams(location.search).has('embed')) {
        document.body.classList.add('is-embed');
      }

      var morphData = sessionStorage.getItem('projects-morph');

      if (morphData) {
        // Hide the projects card before React renders it — prevents flash at natural position
        var hideStyle = document.createElement('style');
        hideStyle.textContent = '#projects-card { opacity: 0 !important; }';
        document.head.appendChild(hideStyle);

        sessionStorage.removeItem('projects-morph');
        var origin = JSON.parse(morphData);

        // Poll each frame until React has rendered #projects-card
        var deadline = Date.now() + 3000;
        (function poll() {
          var card = document.getElementById('projects-card');
          if (!card) { if (Date.now() < deadline) requestAnimationFrame(poll); return; }

          requestAnimationFrame(function() {
            var dest = card.getBoundingClientRect();
            var dx = origin.left - dest.left;
            var dy = origin.top - dest.top;
            var sx = origin.width / dest.width;
            var sy = origin.height / dest.height;

            // Place card at home-card position instantly
            card.style.transformOrigin = 'top left';
            card.style.transition = 'none';
            card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scaleX(' + sx + ') scaleY(' + sy + ')';
            card.style.opacity = '1';

            requestAnimationFrame(function() {
              // Animate to natural position
              card.style.transition = 'transform 0.6s cubic-bezier(0.16,1,0.3,1)';
              card.style.transform = 'translate(0,0) scaleX(1) scaleY(1)';

              card.addEventListener('transitionend', function cleanup(e) {
                if (e.propertyName !== 'transform') return;
                hideStyle.remove();
                card.style.transition = '';
                card.style.transform = '';
                card.style.transformOrigin = '';
                card.style.opacity = '';
                card.removeEventListener('transitionend', cleanup);
              });
            });
          });
        })();

      } else {
        document.body.classList.add('page-entering');
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
        });
      }

      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    })();
  </script>
</body>
</html>
