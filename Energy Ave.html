<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Ave — UX Research Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAFAF8;
      --white: #FFFFFF;
      --black: #111111;
      --gray: #6B6B6B;
      --border: rgba(0,0,0,0.08);
      --green: #3DAA74;
      --green-light: #F0FAF5;
      --amber: #E07D2E;
      --accent: #3DAA74;
      --font: 'DM Sans', sans-serif;
      --serif: 'Lora', Georgia, serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: #EBF7F2; color: #2A8A5C; }

    /* NAV */
    .nav-pill {
      position: fixed; top: 16px; right: 48px; z-index: 300;
      display: flex; align-items: center; gap: 16px; padding: 8px;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.15s; text-decoration: none;
    }
    .nav-btn.active { box-shadow: 0 0 0 1.5px rgba(0,0,0,0.22); }
    @media (max-width: 768px) { .nav-pill { right: 20px; } }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #EBF7F2;
      color: var(--accent, #3DAA74);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 10px 16px;
      text-align: left;
    }
    td {
      padding: 11px 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(20,20,20,0.06);
      vertical-align: middle;
      line-height: 1.5;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(61,170,116,0.025); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

    /* Section padding override via JS tweaks */
    section { padding: var(--section-pad, 96px 0); }

    /* Link reset */
    button { font-family: var(--font); }

    /* Page transitions */
    body { transition: opacity 0.3s ease-in-out; }
    body.page-entering, body.page-leaving { opacity: 0; }
  </style>
</head>
<body>

  <!-- NAV PILL -->
  <nav class="nav-pill" aria-label="Site navigation">
    <a href="contact.html" class="nav-btn" title="Contact" style="color:#71717a">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 5.5L8 9.5L14 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </a>
  </nav>

  <template id="__bundler_thumbnail" data-bg-color="#FAF7F2">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#FAF7F2"/>
      <rect x="80" y="80" width="320" height="8" rx="4" fill="#3DAA74" opacity="0.4"/>
      <rect x="80" y="110" width="600" height="48" rx="8" fill="#141414" opacity="0.85"/>
    </svg>
  </template>

  <div id="root"></div>
  <script type="text/babel" src="ea-shared.jsx"></script>
  <script type="text/babel" src="ea-sections-1.jsx"></script>
  <script type="text/babel" src="ea-sections-2.jsx"></script>
  <script type="text/babel" src="ea-sections-3.jsx"></script>
  <script type="text/babel" src="ea-sections-4.jsx"></script>
  <script type="text/babel" src="ea-app.jsx"></script>

  <script>
    (function() {
      var morphData = sessionStorage.getItem('projects-morph');

      if (morphData) {
        // Hide the projects card before React renders it — prevents flash at natural position
        var hideStyle = document.createElement('style');
        hideStyle.textContent = '#projects-card { opacity: 0 !important; }';
        document.head.appendChild(hideStyle);

        sessionStorage.removeItem('projects-morph');
        var origin = JSON.parse(morphData);

        // Poll each frame until React has rendered #projects-card
        var deadline = Date.now() + 3000;
        (function poll() {
          var card = document.getElementById('projects-card');
          if (!card) { if (Date.now() < deadline) requestAnimationFrame(poll); return; }

          requestAnimationFrame(function() {
            var dest = card.getBoundingClientRect();
            var dx = origin.left - dest.left;
            var dy = origin.top - dest.top;
            var sx = origin.width / dest.width;
            var sy = origin.height / dest.height;

            // Place card at home-card position instantly
            card.style.transformOrigin = 'top left';
            card.style.transition = 'none';
            card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scaleX(' + sx + ') scaleY(' + sy + ')';
            card.style.opacity = '1';

            requestAnimationFrame(function() {
              // Animate to natural position
              card.style.transition = 'transform 0.6s cubic-bezier(0.16,1,0.3,1)';
              card.style.transform = 'translate(0,0) scaleX(1) scaleY(1)';

              card.addEventListener('transitionend', function cleanup(e) {
                if (e.propertyName !== 'transform') return;
                hideStyle.remove();
                card.style.transition = '';
                card.style.transform = '';
                card.style.transformOrigin = '';
                card.style.opacity = '';
                card.removeEventListener('transitionend', cleanup);
              });
            });
          });
        })();

      } else {
        document.body.classList.add('page-entering');
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
        });
      }

      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    })();
  </script>
</body>
</html>
