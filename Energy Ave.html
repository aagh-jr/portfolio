<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Ave — UX Research Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2;
      --white: #FFFFFF;
      --black: #141414;
      --gray: #6B6B6B;
      --border: rgba(20,20,20,0.07);
      --green: #3DAA74;
      --green-light: #EBF7F2;
      --amber: #E07D2E;
      --accent: #3DAA74;
      --font: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--black);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: #EBF7F2; color: #2A8A5C; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #EBF7F2;
      color: var(--accent, #3DAA74);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 10px 16px;
      text-align: left;
    }
    td {
      padding: 11px 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(20,20,20,0.06);
      vertical-align: middle;
      line-height: 1.5;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(61,170,116,0.025); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

    /* Section padding override via JS tweaks */
    section { padding: var(--section-pad, 96px 0); }

    /* Link reset */
    button { font-family: var(--font); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="ea-shared.jsx"></script>
  <script type="text/babel" src="ea-sections-1.jsx"></script>
  <script type="text/babel" src="ea-sections-2.jsx"></script>
  <script type="text/babel" src="ea-sections-3.jsx"></script>
  <script type="text/babel" src="ea-sections-4.jsx"></script>
  <script type="text/babel" src="ea-app.jsx"></script>
</body>
</html>
