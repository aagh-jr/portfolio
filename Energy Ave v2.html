<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Ave — UX Research Case Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #fffffd;
      color: #1e1e1a;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: rgba(184,118,42,0.15); color: #1e1e1a; }
    button { font-family: 'DM Sans', sans-serif; }

    /* White sections sit on top of the warm bg */
    section[style*="background: #ffffff"],
    section[style*="background: white"] {
      position: relative;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

    /* Page transitions */
    body { transition: opacity 0.3s ease-in-out; }
    body.page-entering, body.page-leaving { opacity: 0; }

    /* Embed mode */
    body.is-embed .nav-pill { display: none !important; }

    /* Table defaults */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; }
    td { vertical-align: middle; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel" src="ea-shared-v2.jsx"></script>
  <script type="text/babel" src="ea-sections-1-v2.jsx"></script>
  <script type="text/babel" src="ea-sections-2-v2.jsx"></script>
  <script type="text/babel" src="ea-sections-3-v2.jsx"></script>
  <script type="text/babel" src="ea-sections-4-v2.jsx"></script>
  <script type="text/babel" src="ea-app-v2.jsx"></script>

  <script>
    (function() {
      if (new URLSearchParams(location.search).has('embed')) {
        document.body.classList.add('is-embed');
      }
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    })();
  </script>
</body>
</html>
