<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Abel Angel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #fcf9f3;
      background-image:
        radial-gradient(at 20% 30%, rgba(171,195,233,0.35) 0px, transparent 55%),
        radial-gradient(at 75% 70%, rgba(255,221,152,0.25) 0px, transparent 50%),
        radial-gradient(at 55% 10%, rgba(200,240,210,0.2) 0px, transparent 45%);
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    a.project-item { color: inherit; }

    /* ── NAV ── */
    .nav-pill {
      position: fixed; top: 16px; right: 48px; z-index: 200;
      display: flex; align-items: center; gap: 16px; padding: 8px;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.15s; cursor: pointer;
    }
    .nav-btn.active { box-shadow: 0 0 0 1.5px rgba(0,0,0,0.22); }
    .nav-btn svg { display: block; }
    .nav-sep { display: none; }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 40px 0 20px; }
    .main {
      max-width: 1200px;
      padding: 150px 48px 96px 24px;
      display: flex; flex-direction: column; gap: 40px;
    }

    /* ── HEADING ── */
    .page-heading {
      font-family: 'Manrope', sans-serif;
      font-size: 40px; font-weight: 800; color: #a0a09a;
      letter-spacing: -0.016em; line-height: 1.2;
      padding-left: 28px;
    }

    /* ── PROJECTS GRID ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .project-item {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow:
        0 4px 32px rgba(0,0,0,0.08),
        inset 0 1.5px 0 rgba(255,255,255,1),
        inset 0 -1px 0 rgba(255,255,255,0.2),
        inset 1.5px 0 0 rgba(255,255,255,0.55),
        inset -1.5px 0 0 rgba(255,255,255,0.2);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    /* diagonal light sweep — top-left refraction */
    .project-item::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 32px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.06) 35%,
        transparent 60%
      );
      pointer-events: none;
      z-index: 2;
    }
    /* top-edge catch light */
    .project-item::after {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95) 30%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.95) 70%, transparent);
      pointer-events: none;
      z-index: 3;
    }
    .project-item:hover {
      transform: translateY(-5px);
      box-shadow:
        0 20px 56px rgba(0,0,0,0.12),
        inset 0 1.5px 0 rgba(255,255,255,1),
        inset 0 -1px 0 rgba(255,255,255,0.2),
        inset 1.5px 0 0 rgba(255,255,255,0.55),
        inset -1.5px 0 0 rgba(255,255,255,0.2);
    }
    .project-thumb, .project-title, .project-desc { position: relative; z-index: 1; }

    /* thumbnail */
    .project-thumb {
      height: 420px;
      border-bottom: 1px solid rgba(255,255,255,0.5);
    }
    .project-thumb--blue {
      background: radial-gradient(circle at 50% 50%, rgba(171,195,233,0.75) 0%, rgba(171,195,233,0.75) 30%, #f6f3ed 100%);
    }
    .project-thumb--red {
      background: linear-gradient(180deg, #f6f3ed 59.7%, rgba(247,212,205,0.86) 76.8%, rgba(248,187,180,0.75) 80.2%, rgba(249,110,100,0.75) 89.8%, rgba(249,12,0,0.75) 99.9%);
    }

    /* title + description */
    .project-title {
      font-size: 32px; font-weight: 800; color: #1c1c18;
      letter-spacing: -0.016em; line-height: 1.2;
      margin-bottom: 6px;
      padding: 24px 28px 0;
    }
    .project-desc {
      font-size: 15px; font-weight: 400; color: #555;
      line-height: 1.55;
      padding: 0 28px 28px;
    }

    /* ── PAGE TRANSITIONS ── */
    body { transition: opacity 0.3s ease-in-out; }
    body.page-entering, body.page-leaving { opacity: 0; }

    /* ── HEADING SLIDE-IN ── */
    @keyframes slideInLeft {
      from { transform: translateX(-28px); }
      to   { transform: translateX(0); }
    }
    .page-heading { animation: slideInLeft 0.65s cubic-bezier(0.16,1,0.3,1) both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-pill { right: 20px; gap: 12px; }
      .main { padding: 120px 24px 64px; }
      .page-heading { font-size: 28px; }
      .projects-grid { grid-template-columns: 1fr; }
      .project-thumb { height: 220px; }
      .project-title { font-size: 24px; }
      .project-desc { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- FLOATING NAV PILL -->
  <nav class="nav-pill" aria-label="Site navigation">
    <a href="index.html" class="nav-btn" title="Home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 6.5L8 2L14 6.5V14H10V10H6V14H2V6.5Z" stroke="#71717a" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- Projects active -->
    <a href="projects.html" class="nav-btn active" title="Projects">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 5H12.5C13.33 5 14 5.67 14 6.5V12C14 12.83 13.33 13.5 12.5 13.5H3.5C2.67 13.5 2 12.83 2 12V4.5Z" stroke="#141414" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="about.html" class="nav-btn" title="About">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5.5" r="2.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2.5 14C2.5 11.515 5.015 9.5 8 9.5C10.985 9.5 13.5 11.515 13.5 14" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
    <div class="nav-sep"></div>
    <a href="contact.html" class="nav-btn" title="Contact">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2 5.5L8 9.5L14 5.5" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-wrap">
    <main class="main">

      <h1 class="page-heading">Projects</h1>

      <div class="projects-grid">

        <!-- Project 1 — Energy Ave -->
        <a href="Energy Ave.html" class="project-item">
          <div class="project-thumb project-thumb--blue"></div>
          <p class="project-title">Energy Ave.</p>
          <p class="project-desc">A gamified energy conservation experience built for PlanetFlip — 10 weeks of UX research, two rounds of user testing, and a fully playable in-browser game.</p>
        </a>

        <!-- Project 2 -->
        <div class="project-item">
          <div class="project-thumb project-thumb--red"></div>
          <p class="project-title">Project 2</p>
          <p class="project-desc">Description of project, cnhfhvhf vhhfdhfhfd hfhfdhdhfdh hfhfdh hdfhh hfd hf hdf hfhf h h</p>
        </div>

      </div>

    </main>
  </div>

  <script>
    (function() {
      var morphData = sessionStorage.getItem('projects-morph');

      if (morphData) {
        // Hide all cards and heading before first paint to prevent flash
        var hideStyle = document.createElement('style');
        hideStyle.textContent = '.project-item { opacity: 0 !important; } .page-heading { opacity: 0 !important; }';
        document.head.appendChild(hideStyle);

        sessionStorage.removeItem('projects-morph');
        var origin = JSON.parse(morphData);

        function runMorph() {
          requestAnimationFrame(function() {
            var allCards = document.querySelectorAll('.project-item');
            var firstCard = allCards[0];
            var heading = document.querySelector('.page-heading');
            var otherCards = Array.from(allCards).slice(1);
            if (!firstCard) return;

            // FLIP: compute transform to place first card at home-card position
            var dest = firstCard.getBoundingClientRect();
            var dx = origin.left - dest.left;
            var dy = origin.top - dest.top;
            var sx = origin.width / dest.width;
            var sy = origin.height / dest.height;

            firstCard.style.transformOrigin = 'top left';
            firstCard.style.transition = 'none';
            firstCard.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scaleX(' + sx + ') scaleY(' + sy + ')';
            firstCard.style.opacity = '1'; // overrides hideStyle for this card only

            requestAnimationFrame(function() {
              // Animate to natural position
              firstCard.style.transition = 'transform 0.6s cubic-bezier(0.16,1,0.3,1)';
              firstCard.style.transform = 'translate(0,0) scaleX(1) scaleY(1)';

              // Fade in heading + other cards after morph settles
              setTimeout(function() {
                if (heading) { heading.style.transition = 'opacity 0.4s ease'; heading.style.opacity = '1'; }
                otherCards.forEach(function(el) { el.style.transition = 'opacity 0.4s ease'; el.style.opacity = '1'; });
              }, 380);

              // Clean up all inline styles after animation
              firstCard.addEventListener('transitionend', function cleanup(e) {
                if (e.propertyName !== 'transform') return;
                hideStyle.remove();
                firstCard.style.transition = '';
                firstCard.style.transform = '';
                firstCard.style.transformOrigin = '';
                firstCard.style.opacity = '';
                if (heading) { heading.style.transition = ''; heading.style.opacity = ''; }
                otherCards.forEach(function(el) { el.style.transition = ''; el.style.opacity = ''; });
                firstCard.removeEventListener('transitionend', cleanup);
              });
            });
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', runMorph);
        } else {
          runMorph();
        }

      } else {
        // Normal page fade-in
        document.body.classList.add('page-entering');
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
        });
      }

      // Page fade-out on navigation (for leaving projects.html)
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    })();
  </script>
</body>
</html>
