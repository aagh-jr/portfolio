<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Abel Angel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #fcf9f3;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── NAV PILL ── */
    .nav-pill {
      position: fixed; top: 16px; right: 48px; z-index: 200;
      display: flex; align-items: center; gap: 8px; padding: 7px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,0.05); border-radius: 9999px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; cursor: pointer;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.06); }
    .nav-btn.active { background: rgba(0,0,0,0.08); }
    .nav-btn svg { display: block; }
    .nav-sep { width: 1px; height: 16px; background: rgba(0,0,0,0.1); margin: 0 4px; }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
    .main {
      max-width: 1200px;
      padding: 150px 48px 96px;
      display: flex; flex-direction: column; gap: 40px;
    }

    /* ── HEADING ── */
    .page-heading {
      font-size: 40px; font-weight: 800; color: #141414;
      letter-spacing: -0.016em; line-height: 1; opacity: 0.9;
    }

    /* ── PROJECTS GRID ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .project-item {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* thumbnail card */
    .project-thumb {
      height: 335px;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 32px;
      margin-bottom: 24px;
    }
    .project-thumb--blue {
      background: radial-gradient(circle at 50% 50%, rgba(171,195,233,0.75) 0%, rgba(171,195,233,0.75) 30%, #f6f3ed 100%);
    }
    .project-thumb--red {
      background: linear-gradient(180deg, #f6f3ed 59.7%, rgba(247,212,205,0.86) 76.8%, rgba(248,187,180,0.75) 80.2%, rgba(249,110,100,0.75) 89.8%, rgba(249,12,0,0.75) 99.9%);
    }

    /* title + description */
    .project-title {
      font-size: 32px; font-weight: 800; color: #1c1c18;
      letter-spacing: -0.016em; line-height: 1.2;
      margin-bottom: 4px;
    }
    .project-desc {
      font-size: 25px; font-weight: 400; color: #1c1c18;
      line-height: 1.2;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-pill { right: 20px; }
      .main { padding: 120px 24px 64px; }
      .page-heading { font-size: 28px; }
      .projects-grid { grid-template-columns: 1fr; }
      .project-thumb { height: 220px; }
      .project-title { font-size: 24px; }
      .project-desc { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- FLOATING NAV PILL -->
  <nav class="nav-pill" aria-label="Site navigation">
    <a href="index.html" class="nav-btn" title="Home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 6.5L8 2L14 6.5V14H10V10H6V14H2V6.5Z" stroke="#71717a" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- Projects active -->
    <a href="projects.html" class="nav-btn active" title="Projects">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 5H12.5C13.33 5 14 5.67 14 6.5V12C14 12.83 13.33 13.5 12.5 13.5H3.5C2.67 13.5 2 12.83 2 12V4.5Z" stroke="#141414" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="about.html" class="nav-btn" title="About">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5.5" r="2.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2.5 14C2.5 11.515 5.015 9.5 8 9.5C10.985 9.5 13.5 11.515 13.5 14" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
    <div class="nav-sep"></div>
    <a href="contact.html" class="nav-btn" title="Contact">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2 5.5L8 9.5L14 5.5" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-wrap">
    <main class="main">

      <h1 class="page-heading">Projects</h1>

      <div class="projects-grid">

        <!-- Project 1 — Energy Ave -->
        <a href="Energy Ave.html" class="project-item" style="text-decoration:none;color:inherit;">
          <div class="project-thumb project-thumb--blue"></div>
          <p class="project-title">Energy Ave.</p>
          <p class="project-desc">A gamified energy conservation experience built for PlanetFlip — 10 weeks of UX research, two rounds of user testing, and a fully playable in-browser game.</p>
        </a>

        <!-- Project 2 -->
        <div class="project-item">
          <div class="project-thumb project-thumb--red"></div>
          <p class="project-title">Project 2</p>
          <p class="project-desc">Description of project, cnhfhvhf vhhfdhfhfd hfhfdhdhfdh hfhfdh hdfhh hfd hf hdf hfhf h h</p>
        </div>

      </div>

    </main>
  </div>

</body>
</html>
