<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me — Abel Angel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #fcf9f3;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    .nav-pill {
      position: fixed; top: 16px; right: 48px; z-index: 200;
      display: flex; align-items: center; gap: 16px; padding: 8px;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.15s; cursor: pointer;
    }
    .nav-btn.active { box-shadow: 0 0 0 1.5px rgba(0,0,0,0.22); }
    .nav-btn svg { display: block; }
    .nav-sep { display: none; }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
    .main {
      max-width: 1200px;
      padding: 150px 48px 96px;
      display: flex; flex-direction: column; gap: 64px;
    }

    /* ── HEADING ── */
    .page-heading {
      font-size: 40px; font-weight: 800; color: #71717a;
      letter-spacing: -0.016em; line-height: 1; opacity: 0.9;
    }

    /* ── CONTENT GRID ── */
    .about-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: 335px 1fr;
      gap: 24px;
      min-height: 509px;
    }

    .about-bio {
      grid-column: 1 / span 8;
      grid-row: 1;
      font-size: 25px; font-weight: 700;
      color: #71717a; line-height: 1.2;
      align-self: start;
    }

    /* right decorative card — warm golden gradient */
    .about-deco {
      grid-column: 9 / span 4;
      grid-row: 1 / span 2;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 32px;
      background: radial-gradient(circle at 50% 50%, rgba(255,221,152,1) 0%, rgba(251,232,194,1) 50%, #f6f3ed 100%);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-pill { right: 20px; gap: 12px; }
      .main { padding: 120px 24px 64px; }
      .page-heading { font-size: 28px; }
      .about-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: unset;
      }
      .about-bio { grid-column: 1; grid-row: 1; font-size: 18px; }
      .about-deco { grid-column: 1; grid-row: 2; height: 240px; }
    }
  </style>
</head>
<body>

  <!-- FLOATING NAV PILL -->
  <nav class="nav-pill" aria-label="Site navigation">
    <a href="index.html" class="nav-btn" title="Home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 6.5L8 2L14 6.5V14H10V10H6V14H2V6.5Z" stroke="#71717a" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="projects.html" class="nav-btn" title="Projects">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 5H12.5C13.33 5 14 5.67 14 6.5V12C14 12.83 13.33 13.5 12.5 13.5H3.5C2.67 13.5 2 12.83 2 12V4.5Z" stroke="#71717a" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- About active -->
    <a href="about.html" class="nav-btn active" title="About">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5.5" r="2.5" stroke="#141414" stroke-width="1.5"/>
        <path d="M2.5 14C2.5 11.515 5.015 9.5 8 9.5C10.985 9.5 13.5 11.515 13.5 14" stroke="#141414" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
    <div class="nav-sep"></div>
    <a href="contact.html" class="nav-btn" title="Contact">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2 5.5L8 9.5L14 5.5" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-wrap">
    <main class="main">

      <h1 class="page-heading">About Me</h1>

      <div class="about-grid">
        <p class="about-bio">
          I'm a UC San Diego new grad exploring the intersection of cognitive science and digital experiences. I build tools that help people understand complex data and story lines through intuitive interactions.
        </p>
        <!-- decorative placeholder card — replace with real about content -->
        <div class="about-deco"></div>
      </div>

    </main>
  </div>

</body>
</html>
