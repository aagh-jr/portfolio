<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abel Angel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    /* ──────────────────────────────────────────────────────────────
       editorial-minimal theme tokens. one accent (rust) used sparingly.
       ────────────────────────────────────────────────────────────── */
    :root {
      --bg: #FAFAF7;
      --paper: #FFFFFF;
      --ink: #141413;
      --muted: #6B6B65;
      --rule: rgba(20, 20, 19, 0.09);
      --rule-strong: rgba(20, 20, 19, 0.16);
      --accent: #B5462E;
      --accent-soft: #F4E4DA;
      --serif: 'Fraunces', 'Cardo', Georgia, serif;
      --sans:  'Manrope', system-ui, sans-serif;
      --mono:  'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: var(--accent-soft); color: var(--ink); }

    /* paper grain — fixed, very subtle, multiply-blended */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.045;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── animations: short, quiet ── */
    @keyframes editorialFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes editorialFadeOnly {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .ed-anim    { animation: editorialFadeIn 600ms cubic-bezier(0.2, 0.7, 0.3, 1) both; }
    .ed-anim-d1 { animation-delay: 80ms; }
    .ed-anim-d2 { animation-delay: 160ms; }
    .ed-anim-d3 { animation-delay: 240ms; }
    .ed-anim-d4 { animation-delay: 320ms; }
    .ed-anim-d5 { animation-delay: 400ms; }
    .ed-anim-d6 { animation-delay: 480ms; }

    /* ── shell ── */
    .page-wrap { max-width: 1180px; margin: 0 auto; padding: 0 48px; position: relative; z-index: 2; }

    /* ── masthead ── */
    .masthead {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 28px 0 0;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 16px;
    }
    .masthead .ml { display: flex; align-items: baseline; gap: 20px; }
    .mast-mark {
      font-family: var(--serif);
      font-style: italic;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .mast-meta {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .mast-mark .dot { color: var(--accent); }

    /* ── hero ── */
    .hero { padding: 88px 0 96px; position: relative; }
    .hero h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(72px, 12vw, 168px);
      line-height: 0.92;
      letter-spacing: -0.04em;
      color: var(--ink);
      margin-bottom: 32px;
      font-variation-settings: "opsz" 144;
    }
    .hero h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--ink);
    }
    .hero h1 .period { color: var(--accent); font-style: normal; }

    .hero-rule {
      width: 64px; height: 2px; background: var(--ink);
      margin: 0 0 28px;
    }
    .hero-sub {
      font-family: var(--sans);
      font-size: clamp(18px, 1.6vw, 22px);
      line-height: 1.55;
      color: var(--muted);
      max-width: 580px;
      font-weight: 400;
      letter-spacing: -0.005em;
    }
    .hero-sub b { color: var(--ink); font-weight: 600; }
    .hero-sub em {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      color: var(--ink);
    }
    .hero-meta {
      display: flex; gap: 48px;
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      max-width: 720px;
    }
    .hero-meta .col {
      display: flex; flex-direction: column; gap: 6px;
    }
    .hero-meta .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-meta .val {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    /* ── nav cards ── */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding-bottom: 96px;
    }
    .nav-card {
      position: relative;
      display: flex; flex-direction: column;
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 28px 28px 24px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      min-height: 200px;
      overflow: hidden;
      transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }
    .nav-card:hover {
      border-color: var(--rule-strong);
      transform: translateY(-2px);
      box-shadow: 0 14px 36px -18px rgba(20,20,19,0.18), 0 2px 6px -2px rgba(20,20,19,0.06);
    }
    .nav-card:hover .nc-num,
    .nav-card:hover .nc-arrow { color: var(--accent); }
    .nav-card:hover .nc-arrow { transform: translateX(3px); }

    .nc-num {
      font-family: var(--serif);
      font-style: italic;
      font-size: 18px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.01em;
      transition: color 180ms ease;
    }
    .nc-title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 38px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 22px 0 12px;
      font-variation-settings: "opsz" 72;
    }
    .nc-title .period { color: var(--accent); }
    .nc-desc {
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--muted);
      letter-spacing: -0.005em;
    }
    .nc-foot {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding-top: 28px;
    }
    .nc-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .nc-arrow {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--muted);
      transition: color 180ms ease, transform 180ms ease;
      line-height: 1;
    }

    /* ── footer line ── */
    .colophon {
      border-top: 1px solid var(--rule);
      padding: 22px 0 36px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .colophon a:hover { color: var(--accent); }

    /* ── projects sidebar (morphs in from card) ── */
    body { transition: opacity 0.22s ease-in-out, transform 0.22s ease-in-out; }
    body.page-entering { opacity: 0; transform: translateY(6px); }
    body.page-leaving  { opacity: 0; transform: translateY(-6px); }

    #home-view { transition: opacity 360ms ease; }
    .state-projects #home-view { opacity: 0; pointer-events: none; }

    #projects-sidebar {
      position: fixed;
      top: 24px; left: 24px;
      width: 304px;
      height: calc(100vh - 48px);
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 28px 26px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 40px -18px rgba(20,20,19,0.18), 0 2px 6px -2px rgba(20,20,19,0.06);
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #projects-sidebar.sidebar-active { opacity: 1; pointer-events: auto; }
    #projects-sidebar > * { transition: opacity 200ms ease; }
    #projects-sidebar.morphing > * { opacity: 0; }

    .sb-mast {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .sb-mast .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sb-list {
      display: flex; flex-direction: column;
      gap: 2px;
      flex: 1;
      overflow-y: auto;
      margin: 0 -8px;
      padding: 0 4px;
    }
    .sb-item {
      width: 100%;
      text-align: left;
      font-family: inherit;
      padding: 14px 14px 16px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .sb-item:hover { background: rgba(20,20,19,0.025); }
    .sb-item.active {
      background: var(--accent-soft);
      border-color: rgba(181, 70, 46, 0.16);
    }
    .sb-item .num {
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--muted);
      flex-shrink: 0;
      padding-top: 2px;
    }
    .sb-item.active .num { color: var(--accent); }
    .sb-item .body { flex: 1; }
    .sb-item .title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 18px;
      letter-spacing: -0.015em;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .sb-item .meta {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── case study overlay ── */
    #cs-panel {
      position: fixed; inset: 0;
      z-index: 190;
      background: var(--paper);
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 300ms ease, transform 300ms ease;
    }
    #cs-panel.cs-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #cs-iframe {
      position: absolute;
      top: 0; left: 352px;
      width: calc(100vw - 352px);
      height: 100vh;
      border: none;
      display: block;
      transition: opacity 200ms ease;
    }

    .panel-close {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
      font-family: inherit;
      padding: 0;
    }
    .panel-close:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* ── responsive ── */
    @media (max-width: 920px) {
      .nav-grid { grid-template-columns: 1fr; }
      .nc-title { font-size: 32px; }
      .hero { padding: 56px 0 64px; }
      .hero-meta { flex-wrap: wrap; gap: 28px 36px; }
    }
    @media (max-width: 600px) {
      .page-wrap { padding: 0 24px; }
      .masthead { padding-top: 16px; padding-bottom: 12px; }
      .mast-mark { font-size: 18px; }
      .hero { padding: 40px 0 48px; }
      .colophon { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">

    /* ── morph constants ── */
    const MORPH_DUR = 380;
    const MORPH_EASE = 'cubic-bezier(0.2, 0.7, 0.3, 1)';

    const pendingTimers = [];
    const clearPending = () => {
      while (pendingTimers.length) clearTimeout(pendingTimers.pop());
    };
    let inProjectsView = false;

    function clearCardHover(card) {
      if (!card) return;
      card.style.transform = '';
      card.style.boxShadow = '';
      card.style.borderColor = '';
    }

    function enterProjects() {
      if (inProjectsView) return;
      clearPending();
      inProjectsView = true;

      const card = document.getElementById('card-projects');
      const sidebar = document.getElementById('projects-sidebar');
      const csPanel = document.getElementById('cs-panel');
      if (!card || !sidebar || !csPanel) return;

      clearCardHover(card);
      const cardRect = card.getBoundingClientRect();

      sidebar.style.transition = 'none';
      sidebar.style.top = cardRect.top + 'px';
      sidebar.style.left = cardRect.left + 'px';
      sidebar.style.width = cardRect.width + 'px';
      sidebar.style.height = cardRect.height + 'px';
      sidebar.classList.add('sidebar-active', 'morphing');

      card.style.visibility = 'hidden';
      document.body.classList.add('state-projects');

      void sidebar.offsetWidth;

      const t = `${MORPH_DUR}ms ${MORPH_EASE}`;
      sidebar.style.transition = `top ${t}, left ${t}, width ${t}, height ${t}`;
      sidebar.style.top = '24px';
      sidebar.style.left = '24px';
      sidebar.style.width = '304px';
      sidebar.style.height = (window.innerHeight - 48) + 'px';

      pendingTimers.push(setTimeout(() => {
        sidebar.classList.remove('morphing');
      }, MORPH_DUR - 100));

      pendingTimers.push(setTimeout(() => {
        sidebar.style.transition = '';
        sidebar.style.top = '';
        sidebar.style.left = '';
        sidebar.style.width = '';
        sidebar.style.height = '';
        csPanel.classList.add('cs-visible');
        document.body.style.overflow = 'hidden';
      }, MORPH_DUR));
    }

    function exitProjects() {
      if (!inProjectsView) return;
      clearPending();
      inProjectsView = false;

      const card = document.getElementById('card-projects');
      const sidebar = document.getElementById('projects-sidebar');
      const csPanel = document.getElementById('cs-panel');
      if (!card || !sidebar || !csPanel) return;

      const cardRect = card.getBoundingClientRect();

      csPanel.classList.remove('cs-visible');
      document.body.style.overflow = '';

      sidebar.classList.add('morphing');
      const t = `${MORPH_DUR}ms ${MORPH_EASE}`;
      sidebar.style.transition = `top ${t}, left ${t}, width ${t}, height ${t}`;
      sidebar.style.top = cardRect.top + 'px';
      sidebar.style.left = cardRect.left + 'px';
      sidebar.style.width = cardRect.width + 'px';
      sidebar.style.height = cardRect.height + 'px';

      pendingTimers.push(setTimeout(() => {
        document.body.classList.remove('state-projects');
      }, MORPH_DUR / 2));

      pendingTimers.push(setTimeout(() => {
        sidebar.classList.remove('sidebar-active', 'morphing');
        sidebar.style.transition = '';
        sidebar.style.top = '';
        sidebar.style.left = '';
        sidebar.style.width = '';
        sidebar.style.height = '';
        card.style.visibility = '';
        clearCardHover(card);
      }, MORPH_DUR));
    }

    /* ── projects manifest ── */
    const PROJECTS = [
      {
        id: 1, title: 'Energy Ave.',
        tags: ['UX Research', 'Game Design'], year: '2024',
        desc: 'A gamified energy conservation experience built for PlanetFlip — 10 weeks of UX research, two rounds of user testing, and a fully playable in-browser game.',
        href: 'Energy Ave.html', available: true,
      },
      {
        id: 2, title: "Val's Kitchen.",
        tags: ['UX Research', 'Product Design'], year: '2024',
        desc: 'A kitchen inventory app for a real restaurant client — built from paper sheets to a Figma prototype refined by scenario-based usability testing.',
        href: 'Project 02.html', available: true,
      },
      {
        id: 3, title: 'Cabrillo NM.',
        tags: ['PM', 'Public Engagement', 'NPS'], year: '2023',
        desc: "Two terms as an Associate in the park's Interpretation program — designing, running, measuring, and documenting public engagement programs from Whale Watching to Eco-Web.",
        href: 'Project 03.html', available: true,
      },
      {
        id: 4, title: 'UCSD Laundry App.',
        tags: ['UX Design', 'Participatory'], year: '2025',
        desc: 'A campus laundry app designed through a participatory design lens — six-person team, COMM 124A, covering machine status, lost-and-found, and reporting.',
        href: 'Project 04.html', available: true,
      },
    ];

    const App = () => {
      const [activeId, setActiveId] = React.useState(1);

      const loadProject = (p) => {
        if (!p.href) return;
        if (activeId === p.id) return;
        const iframe = document.getElementById('cs-iframe');
        if (!iframe) return;
        const newSrc = p.available ? p.href + '?embed' : p.href;
        setActiveId(p.id);

        iframe.style.opacity = '0';
        const swap = () => {
          iframe.src = newSrc;
          const reveal = () => {
            iframe.removeEventListener('load', reveal);
            requestAnimationFrame(() => { iframe.style.opacity = '1'; });
          };
          iframe.addEventListener('load', reveal);
        };
        setTimeout(swap, 200);
      };

      const num = (n) => String(n).padStart(2, '0');

      return (
        <>
          {/* ── home view ── */}
          <div id="home-view">
            <div className="page-wrap">

              {/* masthead */}
              <header className="masthead ed-anim">
                <div className="ml">
                  <span className="mast-mark">Abel Angel<span className="dot">.</span></span>
                  <span className="mast-meta">Portfolio · Vol. 01</span>
                </div>
                <span className="mast-meta">San Diego, CA · 2025</span>
              </header>

              {/* hero */}
              <section className="hero">
                <h1 className="ed-anim ed-anim-d1">
                  Abel <em>Angel</em><span className="period">.</span>
                </h1>
                <div className="hero-rule ed-anim ed-anim-d2" />
                <p className="hero-sub ed-anim ed-anim-d3">
                  I research humans and design technology people fall in love with — <em>at the intersection of cognitive science and software</em>.
                </p>

                <div className="hero-meta ed-anim ed-anim-d4">
                  <div className="col">
                    <span className="label">Currently</span>
                    <span className="val">UC San Diego, B.S.</span>
                  </div>
                  <div className="col">
                    <span className="label">Practice</span>
                    <span className="val">UX Research · Product Design · PM</span>
                  </div>
                  <div className="col">
                    <span className="label">Based</span>
                    <span className="val">San Diego, California</span>
                  </div>
                </div>
              </section>

              {/* nav cards */}
              <section className="nav-grid">
                {/* projects — morph trigger */}
                <div
                  id="card-projects"
                  className="nav-card ed-anim ed-anim-d4"
                  onClick={enterProjects}
                >
                  <span className="nc-num">{num(1)}.</span>
                  <h2 className="nc-title">Projects<span className="period">.</span></h2>
                  <p className="nc-desc">Four case studies spanning UX research, product design, and program management.</p>
                  <div className="nc-foot">
                    <span className="nc-tag">View Index</span>
                    <span className="nc-arrow">→</span>
                  </div>
                </div>

                <a href="about.html" className="nav-card ed-anim ed-anim-d5">
                  <span className="nc-num">{num(2)}.</span>
                  <h2 className="nc-title">About<span className="period">.</span></h2>
                  <p className="nc-desc">Cognitive science background, UC San Diego, and what drew me to design.</p>
                  <div className="nc-foot">
                    <span className="nc-tag">Read Bio</span>
                    <span className="nc-arrow">→</span>
                  </div>
                </a>

                <a href="contact.html" className="nav-card ed-anim ed-anim-d6">
                  <span className="nc-num">{num(3)}.</span>
                  <h2 className="nc-title">Contact<span className="period">.</span></h2>
                  <p className="nc-desc">Email, social, and the best way to start a conversation about a role or project.</p>
                  <div className="nc-foot">
                    <span className="nc-tag">Get in Touch</span>
                    <span className="nc-arrow">→</span>
                  </div>
                </a>
              </section>

              {/* colophon */}
              <footer className="colophon">
                <span>Designed &amp; built by Abel · 2025</span>
                <span>Set in Fraunces &amp; Manrope · San Diego</span>
              </footer>

            </div>
          </div>

          {/* projects sidebar — morphs from #card-projects */}
          <div id="projects-sidebar">
            <div className="sb-mast">
              <span className="label">Index · Vol. 01</span>
              <button className="panel-close" onClick={exitProjects} aria-label="Close">✕</button>
            </div>
            <div className="sb-list">
              {PROJECTS.map((p, i) => (
                <button
                  key={p.id}
                  onClick={() => loadProject(p)}
                  className={`sb-item${activeId === p.id ? ' active' : ''}`}
                >
                  <span className="num">{String(i + 1).padStart(2, '0')}</span>
                  <div className="body">
                    <div className="title">{p.title}</div>
                    <div className="meta">{p.available ? p.tags.join(' · ') : 'Coming soon'}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <div id="cs-panel">
    <iframe id="cs-iframe" src="Energy Ave.html?embed" title="Case study" allowtransparency="true"></iframe>
  </div>

  <script>
    (function() {
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });
    })();
  </script>

</body>
</html>
