<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abel Angel Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #FFFAFA;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes slideRight {
      from { transform: translateX(0); }
      to   { transform: translateX(101%); }
    }
    @keyframes slideLeftBack {
      from { transform: translateX(101%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(56px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade    { animation: fadeIn  0.75s ease-out both; }
    .anim-fade-d1 { animation: fadeIn  0.75s ease-out 0.2s both; }
    .anim-up-1    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
    .anim-up-2    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.52s both; }
    .anim-up-3    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.64s both; }

    @media (max-width: 768px) {
      .bento-outer { padding: 0 20px !important; }
      .bento-grid  { grid-template-columns: 1fr !important; }
    }

    body { transition: opacity 0.3s ease-in-out; }
    body.page-entering { opacity: 0; }
    body.page-leaving  { opacity: 0; }
  </style>
</head>
<body class="page-entering">

  <div id="root"></div>

  <script type="text/babel">

    const ABOUT_TEXT = "I'm a Cognitive Science 🧠 graduate from UC San Diego, where I specialized in UX Design and Human-Computer Interaction. I research how people think, how interfaces respond and where the two fall out of sync.\n\nI grew up and reside in San Jose, CA, the capital of Silicon Valley. My Mexican 🇲🇽 and Bay Area 🌉 roots have molded a curious and confident mindset in me that strives to innovate.\n\nOutside of research you'll find me hunting for vintage finds at thrift stores, shooting on a camera or breaking a sweat and your local pilates studio 🤸🏽.";
    const INTRO_TEXT = "I research humans and use design to make them fall in love with tech. Exploring the intersection of cognitive science and digital experiences.";

    const App = () => {
      const [aboutOpen, setAboutOpen] = React.useState(false);
      const [aboutClosing, setAboutClosing] = React.useState(false);
      const [introFading, setIntroFading] = React.useState(false);
      const [lineRects, setLineRects] = React.useState([]);
      const [introLen, setIntroLen] = React.useState(INTRO_TEXT.length);
      const textRef = React.useRef(null);
      const introAnimRef = React.useRef(null);

      const animateIntro = (from, to, duration, onDone) => {
        if (introAnimRef.current) cancelAnimationFrame(introAnimRef.current);
        const start = performance.now();
        const tick = (now) => {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const len = Math.round(from + (to - from) * progress);
          setIntroLen(len);
          if (progress < 1) {
            introAnimRef.current = requestAnimationFrame(tick);
          } else {
            introAnimRef.current = null;
            if (onDone) onDone();
          }
        };
        introAnimRef.current = requestAnimationFrame(tick);
      };

      React.useLayoutEffect(() => {
        if (!aboutOpen || !textRef.current) {
          setLineRects([]);
          return;
        }
        const range = document.createRange();
        range.selectNodeContents(textRef.current);
        const rects = Array.from(range.getClientRects());
        const parentRect = textRef.current.getBoundingClientRect();
        const lineHeightPx = parseFloat(getComputedStyle(textRef.current).lineHeight) || 30;
        const lines = [];
        rects.forEach(r => {
          const top = r.top - parentRect.top;
          const existing = lines.find(l => Math.abs(l.top - top) < lineHeightPx / 2);
          if (existing) {
            existing.left = Math.min(existing.left, r.left - parentRect.left);
            existing.right = Math.max(existing.right, r.right - parentRect.left);
            existing.height = Math.max(existing.height, r.height);
          } else {
            lines.push({
              top,
              left: r.left - parentRect.left,
              right: r.right - parentRect.left,
              height: r.height,
            });
          }
        });
        setLineRects(lines.map(l => ({
          top: l.top,
          left: l.left,
          width: l.right - l.left,
          height: l.height,
        })));
      }, [aboutOpen, aboutClosing]);

      const toggleAbout = () => {
        if (introAnimRef.current || introFading || aboutClosing) return;
        if (!aboutOpen) {
          setIntroFading(true);
          setTimeout(() => {
            setIntroLen(0);
            setIntroFading(false);
            setAboutOpen(true);
          }, 250);
        } else {
          setAboutClosing(true);
          setTimeout(() => {
            setAboutOpen(false);
            setAboutClosing(false);
            animateIntro(0, INTRO_TEXT.length, 250);
          }, 250);
        }
      };

      const cardBg = '#FFFAFA';
      const cardBorder = 'none';
      const cardShadow = 'none';
      const cardBase = {
        background: cardBg, border: cardBorder, borderRadius: 18,
        padding: 15, cursor: 'pointer',
        position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column',
        transition: 'transform 0.25s, box-shadow 0.25s', textDecoration: 'none', color: 'inherit',
      };
      const labelStyle = {
        fontSize: 17, fontWeight: 800, color: '#1c1c18',
        letterSpacing: '-0.02em', lineHeight: 1.2,
        position: 'relative', zIndex: 1,
      };

      return (
        <>
          {/* ── Home view: bento grid ── */}
          <div id="home-view">
            <div className="bento-outer" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 48px' }}>
              <div style={{ padding: '48px 0 96px' }}>
                <div className="bento-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>

                  {/* ── TOP CARD: full width hero ── */}
                  <div className="anim-fade" style={{
                    ...cardBase, gridColumn: '1 / -1',
                    cursor: 'default', minHeight: 260,
                    justifyContent: 'flex-start',
                    paddingTop: 40,
                    background: 'transparent', border: 'none', boxShadow: 'none',
                  }}>
                    <div style={{
                      fontSize: 40, fontWeight: 800, letterSpacing: '-0.016em',
                      lineHeight: 1, marginBottom: 24,
                    }}>
                      <span style={{ color: '#000', fontWeight: 800 }}>Hey! I'm </span>
                      <span style={{ color: '#000', fontWeight: 800 }}>Abel Angel</span>
                    </div>
                    <div className="anim-fade-d1" style={{
                      fontSize: aboutOpen ? 25 : 40,
                      fontWeight: aboutOpen ? 700 : 800,
                      color: '#71717a',
                      letterSpacing: aboutOpen ? 'normal' : '-0.016em',
                      lineHeight: 1.2,
                      maxWidth: aboutOpen ? 520 : '50vw',
                    }}>
                      {!aboutOpen && (
                        <span style={{
                          display: 'block',
                          animation: introFading ? 'fadeOut 0.25s ease both' : undefined,
                        }}>{INTRO_TEXT.substring(0, introLen)}</span>
                      )}
                      {aboutOpen && (
                        <span ref={textRef} style={{
                          display: 'block',
                          position: 'relative',
                          opacity: lineRects.length > 0 ? 1 : 0,
                          whiteSpace: 'pre-wrap',
                          animation: aboutClosing ? 'fadeOut 0.25s ease both' : undefined,
                        }}>
                          {ABOUT_TEXT.split(/(🇲🇽|🌉|🤸🏽|🧠)/u).map((part, i) =>
                            part === '🇲🇽' || part === '🌉' || part === '🤸🏽' || part === '🧠'
                              ? <span key={i} style={{ fontSize: '1.3em', verticalAlign: 'middle', display: 'inline-block', lineHeight: 1 }}>{part}</span>
                              : <React.Fragment key={i}>{part}</React.Fragment>
                          )}
                          {lineRects.map((rect, i) => {
                            const stagger = lineRects.length > 1 ? (0.25 - 0.1) / (lineRects.length - 1) : 0;
                            const delay = (i * stagger).toFixed(3);
                            return (
                              <span key={i} style={{
                                position: 'absolute',
                                top: rect.top, left: rect.left,
                                width: rect.width + 2, height: rect.height,
                                background: '#FFFAFA',
                                animation: `slideRight 0.1s ease ${delay}s forwards`,
                              }} />
                            );
                          })}
                        </span>
                      )}
                    </div>
                    {aboutOpen && (
                      <div style={{
                        position: 'absolute',
                        top: 40,
                        right: 15,
                        width: 'calc(50% - 15px)',
                        display: 'flex',
                        flexDirection: 'column',
                        gap: 20,
                        animation: aboutClosing ? 'fadeOut 0.25s ease both' : 'fadeIn 0.75s ease both',
                      }}>
                        <img src="uploads/abel-portrait.jpg" alt="Abel" style={{
                          width: '100%',
                          aspectRatio: '4 / 3',
                          objectFit: 'cover',
                          objectPosition: 'center',
                          borderRadius: 12,
                        }} />
                        <div style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
                          {[
                            {
                              label: 'Email',
                              href: 'mailto:abel.aagh@gmail.com',
                              external: false,
                              svg: <path d="M3 7l9 6 9-6M5 5h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" />,
                            },
                            {
                              label: 'LinkedIn',
                              href: 'https://www.linkedin.com/in/abel-a-gonzalez',
                              external: true,
                              svg: <><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z" /><rect x="2" y="9" width="4" height="12" /><circle cx="4" cy="4" r="2" /></>,
                            },
                            {
                              label: 'GitHub',
                              href: 'https://github.com/aagh-jr',
                              external: true,
                              svg: <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />,
                            },
                          ].map(({ label, href, external, svg }) => (
                            <a key={label} href={href}
                              target={external ? '_blank' : undefined}
                              rel={external ? 'noreferrer' : undefined}
                              aria-label={label}
                              style={{
                                color: '#71717a',
                                display: 'inline-flex',
                                transition: 'color 0.15s',
                              }}
                              onMouseEnter={e => e.currentTarget.style.color = '#1c1c18'}
                              onMouseLeave={e => e.currentTarget.style.color = '#71717a'}
                            >
                              <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                {svg}
                              </svg>
                            </a>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>

                </div>
              </div>
            </div>
          </div>

          {/* ── Bottom-right nav ── */}
          <div className="anim-fade-d1" style={{
            position: 'fixed',
            bottom: 48,
            right: 'max(48px, calc((100vw - 1280px) / 2 + 48px))',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'flex-end',
            gap: 6,
            zIndex: 100,
          }}>
            {[
              { label: 'about',    href: '#',             symbol: aboutOpen ? '−' : '+', onClick: toggleAbout },
              { label: 'projects', href: 'projects.html', symbol: '↗' },
            ].map(({ label, href, symbol, onClick }) => (
              <a key={label} href={href}
                onClick={onClick ? (e) => { e.preventDefault(); onClick(); } : undefined}
                style={{
                  fontSize: 40, fontWeight: 800, color: '#1c1c18',
                  letterSpacing: '-0.016em',
                  transition: 'color 0.15s',
                  display: 'inline-flex', alignItems: 'center', gap: 8,
                  cursor: 'pointer',
                }}
                onMouseEnter={e => e.currentTarget.style.color = '#71717a'}
                onMouseLeave={e => e.currentTarget.style.color = '#1c1c18'}
              >
                {label}
                <span style={{ fontSize: 54, opacity: 1, color: '#000', transition: 'opacity 0.15s', display: 'inline-block', width: '48px', textAlign: 'center', lineHeight: 1 }}>{symbol}</span>
              </a>
            ))}
          </div>

          {/* ── Bottom-left contact nav ── */}
          <div className="anim-fade-d1" style={{
            position: 'fixed',
            bottom: 48,
            left: 'max(48px, calc((100vw - 1280px) / 2 + 48px))',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'flex-start',
            gap: 6,
            zIndex: 100,
          }}>
            {[
              { label: 'Email',    href: 'mailto:abel.aagh@gmail.com',                external: false },
              { label: 'LinkedIn', href: 'https://www.linkedin.com/in/abel-a-gonzalez', external: true },
              { label: 'GitHub',   href: 'https://github.com/aagh-jr',                  external: true },
            ].map(({ label, href, external }) => (
              <a key={label} href={href}
                target={external ? '_blank' : undefined}
                rel={external ? 'noreferrer' : undefined}
                style={{
                  fontSize: 40, fontWeight: 800, color: '#1c1c18',
                  letterSpacing: '-0.016em',
                  lineHeight: 1.2,
                  transition: 'color 0.15s',
                  cursor: 'pointer',
                }}
                onMouseEnter={e => e.currentTarget.style.color = '#71717a'}
                onMouseLeave={e => e.currentTarget.style.color = '#1c1c18'}
              >
                {label}
              </a>
            ))}
          </div>

        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    (function() {

      /* ── Page enter fade ── */
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });

      /* ── Page-leave fade for anchor navigation ── */
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.addEventListener('transitionend', function go(ev) {
          if (ev.propertyName !== 'opacity') return;
          document.body.removeEventListener('transitionend', go);
          window.location.href = href;
        });
        document.body.classList.add('page-leaving');
      });

    })();
  </script>

</body>
</html>
