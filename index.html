  <script>
    (function() {

      /* ── Page enter fade ── */
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });

      /* ── Page-leave fade for anchor navigation ── */
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });

    })();

    /* ── Folder card spring scroll ── */
    (function() {
      function init() {
        var card    = document.getElementById('folder-card');
        if (!card) { requestAnimationFrame(init); return; }
        var content = document.getElementById('home-content');
        var inner   = document.getElementById('inner-card');
        var close   = document.getElementById('close-card');

        var INITIAL_OFFSET = 130;  // px of card visible at scroll 0
        var SCROLL_FACTOR  = 1.2;  // target moves faster than scroll so spring has room to lag
        var STIFFNESS      = 0.055;
        var DAMPING        = 0.70; // underdamped — gives recoil when settling

        var currentTop   = window.innerHeight - INITIAL_OFFSET;
        var velocity     = 0;
        var targetTop    = currentTop;
        var isOpen       = false;
        var ignoreScroll = false;  // suppress scroll-driven target updates during close anim

        function getStopAt() { return window.innerHeight * 0.03; }
        function getTarget() {
          if (isOpen) return getStopAt();
          return Math.max(getStopAt(), window.innerHeight - INITIAL_OFFSET - window.scrollY * SCROLL_FACTOR);
        }

        window.addEventListener('scroll', function() {
          if (ignoreScroll) return;
          targetTop = getTarget();
        }, { passive: true });
        window.addEventListener('resize', function() {
          currentTop = getTarget();
          targetTop  = currentTop;
          velocity   = 0;
          card.style.top = currentTop + 'px';
        });

        window.closeFolderCard = function() {
          if (!isOpen) return;
          isOpen = false;
          ignoreScroll = true;
          document.body.style.overflow = '';

          // Drive the spring back down explicitly — don't rely on scroll events firing.
          // Reset scroll instantly; the fixed card hides the visual jump.
          targetTop = window.innerHeight - INITIAL_OFFSET;
          window.scrollTo(0, 0);

          // Re-sync with scroll once the spring has had time to settle.
          setTimeout(function() {
            ignoreScroll = false;
            targetTop = getTarget();
          }, 1500);
        };

        (function tick() {
          velocity   += (targetTop - currentTop) * STIFFNESS;
          velocity   *= DAMPING;
          currentTop += velocity;
          card.style.top = currentTop.toFixed(2) + 'px';

          var startTop = window.innerHeight - INITIAL_OFFSET;
          var stopTop  = getStopAt();
          var progress = (startTop - currentTop) / (startTop - stopTop);
          if (progress < 0) progress = 0;
          else if (progress > 1) progress = 1;

          if (content) content.style.opacity = (1 - progress).toFixed(3);

          var innerP = (progress - 0.7) / 0.3;  // fade in over last 30% of travel
          if (innerP < 0) innerP = 0;
          else if (innerP > 1) innerP = 1;

          if (inner) {
            inner.style.opacity = innerP.toFixed(3);
            inner.style.transform = 'translateY(' + ((1 - innerP) * 20).toFixed(2) + 'px)';
            inner.style.pointerEvents = innerP > 0.5 ? 'auto' : 'none';
          }

          if (close) {
            close.style.opacity = innerP.toFixed(3);
            close.style.pointerEvents = innerP > 0.5 ? 'auto' : 'none';
          }

          // Lock body scroll once the card has essentially reached the top
          if (!isOpen && progress > 0.995) {
            isOpen = true;
            document.body.style.overflow = 'hidden';
          }

          requestAnimationFrame(tick);
        })();
      }
      init();
    })();
  </script>
