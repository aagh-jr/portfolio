<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abel Angel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #f0f0f3;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(56px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade    { animation: fadeIn  0.6s ease-out both; }
    .anim-fade-d1 { animation: fadeIn  0.6s ease-out 0.2s both; }
    .anim-up-1    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
    .anim-up-2    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.52s both; }
    .anim-up-3    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.64s both; }

    @media (max-width: 768px) {
      .bento-outer { padding: 0 20px !important; }
      .bento-grid  { grid-template-columns: 1fr !important; }
    }

    body { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; }
    body.page-entering { opacity: 0; transform: translateY(8px); }
    body.page-leaving  { opacity: 0; transform: translateY(-8px); }

    /* Home view fades when entering Projects.
       Duration matches the morph so phases overlap cleanly. */
    #home-view {
      transition: opacity 400ms ease;
    }
    .state-projects #home-view {
      opacity: 0;
      pointer-events: none;
    }

    /* Sidebar — uses height (not bottom) so it can be morphed via inline
       width/height/top/left transitions during enter/exit. Inner contents
       fade out via .morphing class so they don't squish during the morph. */
    #projects-sidebar {
      position: fixed;
      top: 24px;
      left: calc(7.5vw + 24px);
      width: calc(85vw - 48px);
      height: calc(100vh - 48px);
      background: #e4e4e8;
      border-radius: 18px;
      border: none;
      padding: 28px 32px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      box-shadow: none;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #projects-sidebar.sidebar-active {
      opacity: 1;
      pointer-events: auto;
    }
    #projects-sidebar > * {
      transition: opacity 200ms ease;
    }
    #projects-sidebar.morphing > * {
      opacity: 0;
    }

    /* Case study overlay — durations match (300ms) so opacity and transform
       finish together. Iframe has its own fade for sidebar project switches. */
    #cs-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 7.5vw;
      z-index: 190;
      background: #fff;
      opacity: 0;
      transform: translateX(16px);
      pointer-events: none;
      transition: opacity 300ms ease, transform 300ms ease;
      box-shadow: none;
    }
    #cs-panel.cs-visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #cs-iframe {
      position: absolute;
      top: 0;
      left: 348px;
      width: calc(85vw - 348px);
      height: 100vh;
      border: none;
      display: block;
      transition: opacity 200ms ease;
    }

    .panel-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: #71717a;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      padding: 0;
    }
    .panel-close:hover { background: rgba(0,0,0,0.08); color: #1c1c18; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">

    /* ── Morph constants ── */
    const MORPH_DUR = 400;
    const MORPH_EASE = 'cubic-bezier(0.16,1,0.3,1)';

    /* pendingTimers is shared across enter/exit so a rapid toggle can
       cancel the other direction's queued work. Without this, a half-open
       state can leak through (sidebar visible without iframe, etc.) */
    const pendingTimers = [];
    const clearPending = () => {
      while (pendingTimers.length) clearTimeout(pendingTimers.pop());
    };
    let inProjectsView = false;

    function clearCardHover(card) {
      if (!card) return;
      card.style.transform = '';
      card.style.boxShadow = '';
      const glow = card.querySelector('.card-glow');
      if (glow) glow.style.opacity = 0;
    }

    function enterProjects() {
      if (inProjectsView) return;
      clearPending();
      inProjectsView = true;

      const card    = document.getElementById('card-projects');
      const sidebar = document.getElementById('projects-sidebar');
      const csPanel = document.getElementById('cs-panel');
      if (!card || !sidebar || !csPanel) return;

      clearCardHover(card);

      const cardRect = card.getBoundingClientRect();

      /* Place sidebar at the card's exact rect (no transition).
         Sidebar bg/border match the card, so visually it just replaces it. */
      sidebar.style.transition = 'none';
      sidebar.style.top    = cardRect.top + 'px';
      sidebar.style.left   = cardRect.left + 'px';
      sidebar.style.width  = cardRect.width + 'px';
      sidebar.style.height = cardRect.height + 'px';
      sidebar.classList.add('sidebar-active', 'morphing');

      /* Hide the underlying card; sidebar is now standing in for it */
      card.style.visibility = 'hidden';

      /* Begin home fade-out at the same time as the morph (overlap) */
      document.body.classList.add('state-projects');

      /* Force reflow so the start rect is registered before transitioning */
      void sidebar.offsetWidth;

      const t = `${MORPH_DUR}ms ${MORPH_EASE}`;
      sidebar.style.transition = `top ${t}, left ${t}, width ${t}, height ${t}`;
      sidebar.style.top    = '24px';
      sidebar.style.left   = (window.innerWidth * 0.075 + 24) + 'px';
      sidebar.style.width  = (window.innerWidth * 0.85 - 48) + 'px';
      sidebar.style.height = (window.innerHeight - 48) + 'px';

      /* Reveal sidebar contents just before the morph completes */
      pendingTimers.push(setTimeout(() => {
        sidebar.classList.remove('morphing');
      }, MORPH_DUR - 100));

      pendingTimers.push(setTimeout(() => {
        sidebar.style.transition = '';
        sidebar.style.top = '';
        sidebar.style.left = '';
        sidebar.style.width = '';
        sidebar.style.height = '';
        document.body.style.overflow = 'hidden';
      }, MORPH_DUR));
    }

    function exitProjects() {
      if (!inProjectsView) return;
      clearPending();
      inProjectsView = false;

      const card    = document.getElementById('card-projects');
      const sidebar = document.getElementById('projects-sidebar');
      const csPanel = document.getElementById('cs-panel');
      if (!card || !sidebar || !csPanel) return;

      const cardRect = card.getBoundingClientRect();

      document.body.style.overflow = '';

      sidebar.classList.add('morphing');
      const t = `${MORPH_DUR}ms ${MORPH_EASE}`;
      sidebar.style.transition = `top ${t}, left ${t}, width ${t}, height ${t}`;
      sidebar.style.top    = cardRect.top + 'px';
      sidebar.style.left   = cardRect.left + 'px';
      sidebar.style.width  = cardRect.width + 'px';
      sidebar.style.height = cardRect.height + 'px';

      /* Bring home cards back partway through the morph so they're already
         visible when the sidebar finishes shrinking */
      pendingTimers.push(setTimeout(() => {
        document.body.classList.remove('state-projects');
      }, MORPH_DUR / 2));

      pendingTimers.push(setTimeout(() => {
        sidebar.classList.remove('sidebar-active', 'morphing');
        sidebar.style.transition = '';
        sidebar.style.top = '';
        sidebar.style.left = '';
        sidebar.style.width = '';
        sidebar.style.height = '';
        card.style.visibility = '';
        clearCardHover(card);
      }, MORPH_DUR));
    }

    const PROJECTS = [
      {
        id: 1,
        title: 'Energy Ave.',
        tags: ['UX Research', 'Game Design'],
        year: '2024',
        desc: 'A gamified energy conservation experience built for PlanetFlip — 10 weeks of UX research, two rounds of user testing, and a fully playable in-browser game.',
        thumb: 'uploads/ea-cover.png',
        href: 'Energy Ave.html',
        available: true,
      },
      {
        id: 2,
        title: 'Cabrillo NM.',
        tags: ['PM', 'Public Engagement', 'NPS'],
        year: '2023',
        desc: 'Two terms as an Associate in the park\'s Interpretation program — designing, running, measuring, and documenting public engagement programs from Whale Watching to Eco-Web.',
        thumb: 'uploads/cabrillo-nps-logo.png',
        thumbBg: '#1b3a28',
        thumbRatio: '4/3',
        href: 'Project 03.html',
        available: true,
      },
      {
        id: 3,
        title: "Val's Kitchen.",
        tags: ['UX Research', 'Product Design'],
        year: '2024',
        desc: 'A kitchen inventory app for a real restaurant client — built from paper sheets to a Figma prototype refined by scenario-based usability testing.',
        thumb: null,
        href: 'Project 02.html',
        available: true,
      },
    ];

    const App = () => {
      const [activeId, setActiveId] = React.useState(1);

      const loadProject = (p) => {
        if (!p.href || !p.available) return;
        document.body.classList.add('page-leaving');
        setTimeout(() => { window.location.href = p.href; }, 260);
      };

      const cardBg = '#f0f0f3';
      const cardBorder = 'none';
      const cardShadow = 'none';
      const cardBase = {
        background: cardBg, border: cardBorder, borderRadius: 18,
        padding: 15, cursor: 'pointer',
        position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column',
        transition: 'transform 0.25s, box-shadow 0.25s', textDecoration: 'none', color: 'inherit',
      };
      const labelStyle = {
        fontSize: 17, fontWeight: 800, color: '#1c1c18',
        letterSpacing: '-0.02em', lineHeight: 1.2,
        position: 'relative', zIndex: 1,
      };

      return (
        <>
          {/* ── Home view: bento grid ── */}
          <div id="home-view">
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1 }}>
            <div className="bento-outer" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 48px' }}>
              <div style={{ padding: '48px 0 96px' }}>
                <div className="bento-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>

                  {/* ── TOP CARD: full width hero ── */}
                  <div className="anim-fade" style={{
                    ...cardBase, gridColumn: '1 / -1',
                    cursor: 'default', minHeight: 260,
                    justifyContent: 'center',
                    background: 'transparent', border: 'none', boxShadow: 'none',
                  }}>
                    <div style={{
                      fontSize: 40, fontWeight: 800, letterSpacing: '-0.016em',
                      lineHeight: 1, marginBottom: 24,
                    }}>
                      <span style={{ color: '#71717a', fontWeight: 800 }}>Hey! I'm </span>
                      <span style={{ color: '#141414', fontFamily: 'Fraunces, Georgia, serif', fontWeight: 500, letterSpacing: '-0.02em' }}>Abel Angel</span>
                    </div>
                    <p className="anim-fade-d1" style={{
                      fontSize: 25, fontWeight: 700, color: '#71717a',
                      lineHeight: 1.2, maxWidth: 520,
                    }}>
                      I research humans and use design to make them fall in love with tech. Exploring the intersection of cognitive science and digital experiences.{' '}
                      <button onClick={() => {}} style={{
                        width: 26, height: 26, borderRadius: '50%',
                        background: '#1c1c18', border: 'none',
                        color: '#fff', fontSize: 15, fontWeight: 400,
                        cursor: 'pointer', display: 'inline-flex',
                        alignItems: 'center', justifyContent: 'center',
                        verticalAlign: 'middle', lineHeight: '26px',
                        padding: 0, paddingBottom: 1,
                        transition: 'transform 0.15s',
                      }}
                        onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.12)'}
                        onMouseLeave={e => e.currentTarget.style.transform = ''}
                      >+</button>
                    </p>
                    <div className="anim-fade-d1" style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 28 }}>
                      {[
                        { label: 'abel.aagh@gmail.com', href: 'mailto:abel.aagh@gmail.com' },
                        { label: 'linkedin', href: 'https://www.linkedin.com/in/abel-a-gonzalez' },
                        { label: 'resume',   href: '#' },
                      ].map(({ label, href }, i) => (
                        <React.Fragment key={label}>
                          {i > 0 && <span style={{ color: 'rgba(0,0,0,0.2)', fontSize: 11 }}>/</span>}
                          <a href={href} target={href.startsWith('http') ? '_blank' : undefined} rel="noreferrer" style={{
                            fontSize: 11, fontWeight: 400, color: '#71717a',
                            letterSpacing: '0.01em', textTransform: 'none',
                            textDecoration: 'none',
                            transition: 'color 0.15s',
                          }}
                            onMouseEnter={e => e.currentTarget.style.color = '#1c1c18'}
                            onMouseLeave={e => e.currentTarget.style.color = '#71717a'}
                          >{label}</a>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>

                  {/* ── Projects card — click triggers morph ── */}
                  <div id="card-projects" className="anim-up-1"
                    onClick={enterProjects}
                    style={{ ...cardBase, minHeight: 140, boxShadow: cardShadow }}
                    onMouseEnter={e => {
                      e.currentTarget.style.transform = 'translateY(-4px)';
                      e.currentTarget.style.boxShadow = 'none';
                      e.currentTarget.querySelector('.card-glow').style.opacity = 1;
                    }}
                    onMouseLeave={e => {
                      e.currentTarget.style.transform = '';
                      e.currentTarget.style.boxShadow = cardShadow;
                      e.currentTarget.querySelector('.card-glow').style.opacity = 0;
                    }}
                  >
                    <span style={labelStyle}>Projects</span>
                    <div className="card-glow" style={{ position: 'absolute', inset: 0, borderRadius: 18, pointerEvents: 'none', background: 'radial-gradient(circle at 50% 50%, rgba(171,195,233,0.75) 0%, rgba(171,195,233,0.75) 30%, #ffffff 100%)', opacity: 0, transition: 'opacity 0.4s' }} />
                  </div>

                  {/* ── About Me ── */}
                  <a href="about.html" className="anim-up-2" style={{ ...cardBase, minHeight: 140, boxShadow: cardShadow }}
                    onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = 'none'; e.currentTarget.querySelector('.card-glow2').style.opacity = 1; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = cardShadow; e.currentTarget.querySelector('.card-glow2').style.opacity = 0; }}
                  >
                    <span style={labelStyle}>About Me</span>
                    <div className="card-glow2" style={{ position: 'absolute', inset: 0, borderRadius: 18, pointerEvents: 'none', background: 'linear-gradient(180deg, #ffffff 59.7%, rgba(247,212,205,0.86) 76.8%, rgba(249,110,100,0.75) 89.8%, rgba(249,12,0,0.75) 99.9%)', opacity: 0, transition: 'opacity 0.4s' }} />
                  </a>

                  {/* ── Contact ── */}
                  <a href="contact.html" className="anim-up-3" style={{ ...cardBase, minHeight: 140, boxShadow: cardShadow }}
                    onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = 'none'; e.currentTarget.querySelector('.card-glow3').style.opacity = 1; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = cardShadow; e.currentTarget.querySelector('.card-glow3').style.opacity = 0; }}
                  >
                    <span style={labelStyle}>Contact</span>
                    <div className="card-glow3" style={{ position: 'absolute', inset: 0, borderRadius: 18, pointerEvents: 'none', background: 'radial-gradient(circle at 50% 50%, rgba(255,221,152,1) 0%, rgba(251,232,194,1) 50%, #ffffff 100%)', opacity: 0, transition: 'opacity 0.4s' }} />
                  </a>

                </div>
              </div>
            </div>
            </div>

            {/* Spacer pushes folder card so only the tab + sliver shows initially */}
            <div style={{ height: 'calc(100vh - 130px)' }} />

          {/* ── Full-width bottom card (folder shape) ── */}
          <div className="anim-fade-d1" style={{ position: 'relative', width: '100%', paddingTop: 54, zIndex: 50 }}>
            {/* Tab */}
            <div style={{
              position: 'absolute',
              top: 0,
              left: 'max(48px, calc((100vw - 1280px) / 2 + 48px))',
              width: 320,
              height: 54,
              background: '#ddeeff',
              borderRadius: '12px 12px 0 0',
              boxShadow: 'none',
              display: 'flex', alignItems: 'center', paddingLeft: 16,
            }}>
              <span style={{ fontSize: 15, fontWeight: 700, color: '#1c1c18', letterSpacing: '-0.01em' }}>Projects</span>
            </div>
            {/* Card body */}
            <div style={{
              width: '100%',
              minHeight: '100vh',
              background: '#ddeeff',
              boxShadow: cardShadow,
              borderRadius: 18,
            }} />
          </div>

          {/* ── Projects sidebar — always in DOM, never display:none ── */}
          <div id="projects-sidebar">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20, flexShrink: 0 }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: '#71717a', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Projects</span>
              <button className="panel-close" onClick={exitProjects} aria-label="Close">✕</button>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, flex: 1, overflowY: 'auto' }}>
              {PROJECTS.map(p => (
                <button key={p.id} onClick={() => loadProject(p)} style={{
                  textAlign: 'left', fontFamily: 'inherit',
                  padding: 0, borderRadius: 0,
                  background: 'none', border: 'none',
                  cursor: p.available ? 'pointer' : 'default',
                  opacity: p.available ? 1 : 0.45,
                  display: 'flex', flexDirection: 'column', gap: 0,
                }}
                  onMouseEnter={e => { if (p.available) { e.currentTarget.querySelector('.proj-thumb').style.transform = 'scale(0.98)'; }}}
                  onMouseLeave={e => { e.currentTarget.querySelector('.proj-thumb').style.transform = ''; }}
                >
                  {/* Image placeholder */}
                  <div className="proj-thumb" style={{
                    width: '100%', aspectRatio: p.thumbRatio || '3/2',
                    borderRadius: 14,
                    background: p.thumb
                      ? p.thumbBg
                        ? `${p.thumbBg} url(${p.thumb}) center/55% auto no-repeat`
                        : `url(${p.thumb}) center/cover no-repeat`
                      : 'rgba(0,0,0,0.07)',
                    transition: 'transform 0.2s ease',
                    marginBottom: 14,
                    flexShrink: 0,
                  }} />
                  {/* Text */}
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#71717a', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6 }}>
                    {p.available ? p.tags.join(' · ') : 'Coming soon'} <span style={{ color: 'rgba(0,0,0,0.25)' }}>· {p.year}</span>
                  </div>
                  <div style={{ fontSize: 19, fontWeight: 800, color: '#1c1c18', letterSpacing: '-0.02em', lineHeight: 1.2, marginBottom: 8 }}>{p.title}</div>
                  {p.desc && (
                    <div style={{ fontSize: 13, color: '#71717a', lineHeight: 1.6 }}>{p.desc}</div>
                  )}
                </button>
              ))}
            </div>
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <div id="cs-panel">
    <iframe id="cs-iframe" src="Energy Ave.html?embed" title="Case study" allowtransparency="true"></iframe>
  </div>

  <script>
    (function() {

      /* ── Page enter fade ── */
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });

      /* ── Page-leave fade for anchor navigation ── */
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });

    })();
  </script>

</body>
</html>
