<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abel Angel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #fcf9f3;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      position: relative;
    }

    a { color: inherit; text-decoration: none; }

    /* ── NAV PILL ── */
    .nav-pill {
      position: fixed;
      top: 16px;
      right: 48px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 9999px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      cursor: pointer;
    }
    .nav-btn:hover { background: rgba(0, 0, 0, 0.06); }
    .nav-btn.active { background: rgba(0, 0, 0, 0.08); }
    .nav-btn svg { display: block; }

    .nav-sep {
      width: 1px;
      height: 16px;
      background: rgba(0, 0, 0, 0.1);
      margin: 0 4px;
    }

    /* ── MAIN ── */
    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 40px;
      position: relative;
    }

    .main {
      max-width: 1200px;
      padding: 150px 48px 96px;
      display: flex;
      flex-direction: column;
      gap: 64px;
    }

    /* ── HEADING ── */
    .hero-heading {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.016em;
      line-height: 1;
      opacity: 0.9;
    }
    .hero-heading .muted { color: #71717a; font-weight: 400; }
    .hero-heading .name  { color: #141414; font-weight: 800; }

    /* ── BIO ── */
    .hero-bio {
      font-size: 25px;
      font-weight: 700;
      color: #71717a;
      line-height: 1.2;
      max-width: 1103px;
    }

    /* ── BENTO GRID ── */
    .bento {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .bento-card {
      background: #f6f3ed;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 32px;
      padding: 33px;
      display: flex;
      flex-direction: column;
      min-height: 335px;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .bento-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.08);
    }

    /* gradient overlay — hidden by default, fades in on hover */
    .bento-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 32px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .bento-card:hover::after { opacity: 1; }

    .bento-card--projects::after {
      background: radial-gradient(circle at 50% 50%, rgba(171,195,233,0.75) 0%, rgba(171,195,233,0.75) 30%, #f6f3ed 100%);
    }
    .bento-card--about::after {
      background: linear-gradient(180deg, #f6f3ed 59.7%, rgba(247,212,205,0.86) 76.8%, rgba(248,187,180,0.75) 80.2%, rgba(249,110,100,0.75) 89.8%, rgba(249,12,0,0.75) 99.9%);
    }
    .bento-card--contact::after {
      background: radial-gradient(circle at 50% 50%, rgba(255,221,152,1) 0%, rgba(251,232,194,1) 50%, #f6f3ed 100%);
    }

    .bento-card-title {
      font-size: 32px;
      font-weight: 800;
      color: #1c1c18;
      letter-spacing: -0.02em;
      line-height: 1.2;
      position: relative; /* keep above ::after */
      z-index: 1;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-pill { right: 20px; }
      .main { padding: 120px 24px 64px; gap: 40px; }
      .hero-heading { font-size: 28px; }
      .hero-bio { font-size: 18px; }
      .bento { grid-template-columns: 1fr; }
      .bento-card { min-height: 160px; }
    }
  </style>
</head>
<body>

  <!-- FLOATING NAV PILL -->
  <nav class="nav-pill" aria-label="Site navigation">
    <!-- Home (active) -->
    <a href="index.html" class="nav-btn active" title="Home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 6.5L8 2L14 6.5V14H10V10H6V14H2V6.5Z" stroke="#141414" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- Projects / Work -->
    <a href="projects.html" class="nav-btn" title="Projects">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 5H12.5C13.33 5 14 5.67 14 6.5V12C14 12.83 13.33 13.5 12.5 13.5H3.5C2.67 13.5 2 12.83 2 12V4.5Z" stroke="#71717a" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
    <!-- About -->
    <a href="about.html" class="nav-btn" title="About">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="5.5" r="2.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2.5 14C2.5 11.515 5.015 9.5 8 9.5C10.985 9.5 13.5 11.515 13.5 14" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
    <!-- Separator -->
    <div class="nav-sep"></div>
    <!-- Contact / Connect -->
    <a href="contact.html" class="nav-btn" title="Contact">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#71717a" stroke-width="1.5"/>
        <path d="M2 5.5L8 9.5L14 5.5" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </a>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-wrap">
    <main class="main">

      <!-- HEADING -->
      <div class="hero-heading">
        <span class="muted">Hey! I'm </span><span class="name">Abel Angel</span>
      </div>

      <!-- BIO -->
      <p class="hero-bio">
        I'm a UC San Diego new grad exploring the intersection of cognitive science and digital experiences. I build tools that help people understand complex data and story lines through intuitive interactions.
      </p>

      <!-- BENTO GRID -->
      <div class="bento">

        <a href="projects.html" class="bento-card bento-card--projects">
          <span class="bento-card-title">Projects</span>
        </a>

        <a href="about.html" class="bento-card bento-card--about">
          <span class="bento-card-title">About Me</span>
        </a>

        <a href="contact.html" class="bento-card bento-card--contact">
          <span class="bento-card-title">Contact</span>
        </a>

      </div>

    </main>
  </div>

</body>
</html>
