<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abel Angel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #f0f0f3;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight {
      from { transform: translateX(0); }
      to   { transform: translateX(101%); }
    }
    @keyframes slideLeftBack {
      from { transform: translateX(101%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(56px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade    { animation: fadeIn  0.6s ease-out both; }
    .anim-fade-d1 { animation: fadeIn  0.6s ease-out 0.2s both; }
    .anim-up-1    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
    .anim-up-2    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.52s both; }
    .anim-up-3    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.64s both; }

    @media (max-width: 768px) {
      .bento-outer { padding: 0 20px !important; }
      .bento-grid  { grid-template-columns: 1fr !important; }
    }

    body { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; }
    body.page-entering { opacity: 0; transform: translateY(8px); }
    body.page-leaving  { opacity: 0; transform: translateY(-8px); }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">

    const ABOUT_TEXT = "I'm a fourth-year at UC San Diego studying Cognitive Science with a focus in Design and Interaction. My work lives at the edge of how people think and how products should respond — I bring research methods, systems thinking, and a deep curiosity about human behavior to every project. Outside of screens you'll find me hiking with a camera or overcooking something in the kitchen.";

    const App = () => {
      const [aboutOpen, setAboutOpen] = React.useState(false);
      const [aboutClosing, setAboutClosing] = React.useState(false);
      const [lineRects, setLineRects] = React.useState([]);
      const textRef = React.useRef(null);

      React.useLayoutEffect(() => {
        if (!aboutOpen || !textRef.current) {
          setLineRects([]);
          return;
        }
        const range = document.createRange();
        range.selectNodeContents(textRef.current);
        const rects = Array.from(range.getClientRects());
        const parentRect = textRef.current.getBoundingClientRect();
        const lineHeightPx = parseFloat(getComputedStyle(textRef.current).lineHeight) || 30;
        const lines = [];
        rects.forEach(r => {
          const top = r.top - parentRect.top;
          const existing = lines.find(l => Math.abs(l.top - top) < lineHeightPx / 2);
          if (existing) {
            existing.left = Math.min(existing.left, r.left - parentRect.left);
            existing.right = Math.max(existing.right, r.right - parentRect.left);
            existing.height = Math.max(existing.height, r.height);
          } else {
            lines.push({
              top,
              left: r.left - parentRect.left,
              right: r.right - parentRect.left,
              height: r.height,
            });
          }
        });
        setLineRects(lines.map(l => ({
          top: l.top,
          left: l.left,
          width: l.right - l.left,
          height: l.height,
        })));
      }, [aboutOpen, aboutClosing]);

      const toggleAbout = () => {
        if (!aboutOpen && !aboutClosing) {
          setAboutOpen(true);
        } else if (aboutOpen && !aboutClosing) {
          setAboutClosing(true);
          setTimeout(() => {
            setAboutOpen(false);
            setAboutClosing(false);
          }, 500);
        }
      };

      const cardBg = '#f0f0f3';
      const cardBorder = 'none';
      const cardShadow = 'none';
      const cardBase = {
        background: cardBg, border: cardBorder, borderRadius: 18,
        padding: 15, cursor: 'pointer',
        position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column',
        transition: 'transform 0.25s, box-shadow 0.25s', textDecoration: 'none', color: 'inherit',
      };
      const labelStyle = {
        fontSize: 17, fontWeight: 800, color: '#1c1c18',
        letterSpacing: '-0.02em', lineHeight: 1.2,
        position: 'relative', zIndex: 1,
      };

      return (
        <>
          {/* ── Home view: bento grid ── */}
          <div id="home-view">
            <div className="bento-outer" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 48px' }}>
              <div style={{ padding: '48px 0 96px' }}>
                <div className="bento-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>

                  {/* ── TOP CARD: full width hero ── */}
                  <div className="anim-fade" style={{
                    ...cardBase, gridColumn: '1 / -1',
                    cursor: 'default', minHeight: 260,
                    justifyContent: 'flex-start',
                    paddingTop: 40,
                    background: 'transparent', border: 'none', boxShadow: 'none',
                  }}>
                    <div style={{
                      fontSize: 40, fontWeight: 800, letterSpacing: '-0.016em',
                      lineHeight: 1, marginBottom: 24,
                    }}>
                      <span style={{ color: '#000', fontWeight: 800 }}>Hey! I'm </span>
                      <span style={{ color: '#000', fontWeight: 800 }}>Abel Angel</span>
                    </div>
                    <div className="anim-fade-d1" style={{
                      fontSize: 25, fontWeight: 700, color: '#71717a',
                      lineHeight: 1.2, maxWidth: 520,
                    }}>
                      <span style={{ display: 'block' }}>I research humans and use design to make them fall in love with tech. Exploring the intersection of cognitive science and digital experiences.</span>
                      {aboutOpen && (
                        <span ref={textRef} style={{
                          display: 'block',
                          position: 'relative',
                          opacity: lineRects.length > 0 ? 1 : 0,
                        }}>
                          {ABOUT_TEXT}
                          {lineRects.map((rect, i) => {
                            const stagger = lineRects.length > 1 ? (0.5 - 0.2) / (lineRects.length - 1) : 0;
                            const delay = aboutClosing
                              ? ((lineRects.length - 1 - i) * stagger).toFixed(3)
                              : (i * stagger).toFixed(3);
                            return (
                              <span key={i} style={{
                                position: 'absolute',
                                top: rect.top, left: rect.left,
                                width: rect.width + 2, height: rect.height,
                                background: '#f0f0f3',
                                animation: aboutClosing
                                  ? `slideLeftBack 0.2s ease ${delay}s both`
                                  : `slideRight 0.2s ease ${delay}s forwards`,
                              }} />
                            );
                          })}
                        </span>
                      )}
                    </div>
                    {!aboutOpen && <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 28, animation: 'fadeIn 0.3s ease both' }}>
                      {[
                        { label: 'abel.aagh@gmail.com', href: 'mailto:abel.aagh@gmail.com' },
                        { label: 'linkedin', href: 'https://www.linkedin.com/in/abel-a-gonzalez' },
                        { label: 'resume',   href: '#' },
                      ].map(({ label, href }, i) => (
                        <React.Fragment key={label}>
                          {i > 0 && <span style={{ color: 'rgba(0,0,0,0.2)', fontSize: 11 }}>/</span>}
                          <a href={href} target={href.startsWith('http') ? '_blank' : undefined} rel="noreferrer" style={{
                            fontSize: 11, fontWeight: 400, color: '#71717a',
                            letterSpacing: '0.01em', textTransform: 'none',
                            textDecoration: 'none',
                            transition: 'color 0.15s',
                          }}
                            onMouseEnter={e => e.currentTarget.style.color = '#1c1c18'}
                            onMouseLeave={e => e.currentTarget.style.color = '#71717a'}
                          >{label}</a>
                        </React.Fragment>
                      ))}
                    </div>}
                  </div>

                </div>
              </div>
            </div>
          </div>

          {/* ── Bottom-right nav ── */}
          <div className="anim-fade-d1" style={{
            position: 'fixed',
            bottom: 48,
            right: 'max(48px, calc((100vw - 1280px) / 2 + 48px))',
            display: 'flex',
            flexDirection: 'column',
            alignItems: 'flex-end',
            gap: 6,
            zIndex: 100,
          }}>
            {[
              { label: 'about',    href: '#',             symbol: aboutOpen ? '−' : '+', onClick: toggleAbout },
              { label: 'projects', href: 'projects.html', symbol: '↗' },
            ].map(({ label, href, symbol, onClick }) => (
              <a key={label} href={href}
                onClick={onClick ? (e) => { e.preventDefault(); onClick(); } : undefined}
                style={{
                  fontSize: 40, fontWeight: 800, color: '#1c1c18',
                  letterSpacing: '-0.016em',
                  transition: 'color 0.15s',
                  display: 'inline-flex', alignItems: 'center', gap: 8,
                  cursor: 'pointer',
                }}
                onMouseEnter={e => e.currentTarget.style.color = '#71717a'}
                onMouseLeave={e => e.currentTarget.style.color = '#1c1c18'}
              >
                {label}
                <span style={{ fontSize: 44, opacity: 1, color: '#000', transition: 'opacity 0.15s' }}>{symbol}</span>
              </a>
            ))}
          </div>

        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    (function() {

      /* ── Page enter fade ── */
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });

      /* ── Page-leave fade for anchor navigation ── */
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });

    })();
  </script>

</body>
</html>
