<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦭</text></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abel Angel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #fcf9f3;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(56px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade    { animation: fadeIn  0.6s ease-out both; }
    .anim-fade-d1 { animation: fadeIn  0.6s ease-out 0.2s both; }
    .anim-up-1    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
    .anim-up-2    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.52s both; }
    .anim-up-3    { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.64s both; }

    @media (max-width: 768px) {
      .bento-outer { padding: 0 20px !important; }
      .bento-grid  { grid-template-columns: 1fr !important; }
    }

    body { transition: opacity 0.3s ease-in-out; }
    body.page-entering, body.page-leaving { opacity: 0; }

    /* ── Projects card expand/collapse ───────────────────────
       Collapsed content fades out immediately on click.
       Expanded panel waits 0.38 s (just after the shape morph
       finishes) before fading in.
    ───────────────────────────────────────────────────────── */
    #card-projects .card-collapsed {
      opacity: 1;
      transition: opacity 0.15s ease;
      pointer-events: auto;
    }
    #card-projects.card-expanded .card-collapsed {
      opacity: 0;
      pointer-events: none;
    }

    #card-projects .card-panel {
      position: absolute;
      inset: 0;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease 0.52s;
    }
    #card-projects.card-expanded .card-panel {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Case study panel (iframe loaded on expand) ─────────
       Sits below the card (z-index 190 vs card's 200) and covers
       the full viewport. The iframe is positioned to the right
       of the expanded card via inline style set in JS.
    ───────────────────────────────────────────────────────── */
    #cs-panel {
      position: fixed;
      inset: 0;
      z-index: 190;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease 0.44s;
    }
    #cs-panel.cs-visible { opacity: 1; pointer-events: auto; }
    #cs-iframe {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      border: none;
      height: 100%;
    }

    /* ── Close button (only new chrome needed — project cards reuse cardBase) ── */
    .panel-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: #71717a;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      padding: 0;
    }
    .panel-close:hover { background: rgba(0,0,0,0.08); color: #1c1c18; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">

    const PROJECTS = [
      {
        id: 1,
        title: 'Energy Ave.',
        tags: ['UX Research', 'Game Design'],
        year: '2024',
        desc: 'A gamified energy conservation experience built for PlanetFlip — 10 weeks of UX research, two rounds of user testing, and a fully playable in-browser game.',
        thumb: 'uploads/Energy_Ave.png',
        href: 'Energy Ave.html',
        available: true,
        preview: [
          { heading: 'Key Research Insights', bullets: [
            'Users understood the flow quickly and used a mental model that triggered each screen transition naturally.',
            'Paul took a moment to process, then had a self-described "aha moment" — he initially noted the bed as interactive, then corrected himself by reasoning that only electricity-conducting items should be interactable. This unprompted self-correction validated the game\'s internal logic.',
            'Preesha perceived the game as a "storyline progressing through a household" — she correctly predicted that clicking items would trigger pop-ups and transitions.',
          ]},
        ],
      },
      {
        id: 2,
        title: 'Project 02',
        tags: ['Coming Soon'],
        year: '',
        desc: 'More work on the way.',
        thumb: null,
        href: 'placeholder.html?title=Project%2002',
        available: false,
        preview: null,
      },
      {
        id: 3,
        title: 'Project 03',
        tags: ['Coming Soon'],
        year: '',
        desc: 'More work on the way.',
        thumb: null,
        href: 'placeholder.html?title=Project%2003',
        available: false,
        preview: null,
      },
      {
        id: 4,
        title: 'Project 04',
        tags: ['Coming Soon'],
        year: '',
        desc: 'More work on the way.',
        thumb: null,
        href: 'placeholder.html?title=Project%2004',
        available: false,
        preview: null,
      },
    ];

    const App = () => {
      const [activeId, setActiveId] = React.useState(1);

      const loadProject = (p) => {
        if (!p.href) return;
        setActiveId(p.id);
        var iframe = document.getElementById('cs-iframe');
        if (iframe) {
          iframe.src = p.available ? p.href + '?embed' : p.href;
          iframe.setAttribute('data-loaded', '1');
        }
      };

      const cardBg = '#f6f3ed';
      const cardBorder = '1px solid rgba(0,0,0,0.05)';
      const cardBase = {
        background: cardBg, border: cardBorder, borderRadius: 18,
        padding: 33, cursor: 'pointer',
        position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column',
        transition: 'transform 0.25s, box-shadow 0.25s', textDecoration: 'none', color: 'inherit',
      };
      const labelStyle = {
        fontSize: 32, fontWeight: 800, color: '#1c1c18',
        letterSpacing: '-0.02em', lineHeight: 1.2,
        position: 'relative', zIndex: 1,
      };

      return (
        <div className="bento-outer" style={{ maxWidth: 1280, margin: '0 auto', padding: '0 48px' }}>
          <div style={{ padding: '48px 0 96px' }}>

            <div className="bento-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>

              {/* ── TOP CARD: full width hero ── */}
              <div className="anim-fade" style={{
                ...cardBase, gridColumn: '1 / -1',
                cursor: 'default', minHeight: 260,
                justifyContent: 'center',
              }}>
                <div style={{
                  fontSize: 40, fontWeight: 800, letterSpacing: '-0.016em',
                  lineHeight: 1, marginBottom: 24,
                }}>
                  <span style={{ color: '#71717a', fontWeight: 400 }}>Hey! I'm </span>
                  <span style={{ color: '#141414' }}>Abel Angel</span>
                </div>
                <p className="anim-fade-d1" style={{
                  fontSize: 25, fontWeight: 700, color: '#71717a',
                  lineHeight: 1.2, maxWidth: 520,
                }}>
                  I'm a UC San Diego new grad exploring the intersection of cognitive science and digital experiences. I build tools that help people understand complex data and story lines through intuitive interactions.
                </p>
              </div>

              {/* ── Projects ── */}
              <div id="card-projects" className="anim-up-1" style={{ ...cardBase, minHeight: 400 }}
                onMouseEnter={e => {
                  if (e.currentTarget.classList.contains('card-expanded')) return;
                  e.currentTarget.style.transform = 'translateY(-4px)';
                  e.currentTarget.style.boxShadow = '0 16px 48px rgba(0,0,0,0.08)';
                  e.currentTarget.querySelector('.card-glow').style.opacity = 1;
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.transform = '';
                  e.currentTarget.style.boxShadow = '';
                  e.currentTarget.querySelector('.card-glow').style.opacity = 0;
                }}
              >
                {/* Collapsed pill — fades out as the card expands */}
                <div className="card-collapsed" style={{ display: 'flex', flexDirection: 'column', flex: 1 }}>
                  <span style={labelStyle}>Projects</span>
                  <div className="card-glow" style={{ position: 'absolute', inset: 0, borderRadius: 18, pointerEvents: 'none', background: 'radial-gradient(circle at 50% 50%, rgba(171,195,233,0.75) 0%, rgba(171,195,233,0.75) 30%, #f6f3ed 100%)', opacity: 0, transition: 'opacity 0.4s' }} />
                </div>

                {/* Expanded panel — project navigator sidebar, case study loads in iframe to the right */}
                <div className="card-panel">

                  {/* Header */}
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20, flexShrink: 0 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: '#71717a', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Projects</span>
                    <button className="panel-close" id="projects-close" aria-label="Close">✕</button>
                  </div>

                  {/* Project list — clickable buttons for available projects */}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 4, flex: 1, overflowY: 'auto' }}>
                    {PROJECTS.map(p => (
                      <button key={p.id} onClick={() => loadProject(p)} style={{
                        width: '100%', textAlign: 'left', fontFamily: 'inherit',
                        padding: '14px 16px', borderRadius: 12,
                        background: activeId === p.id ? 'rgba(0,0,0,0.06)' : 'rgba(0,0,0,0.02)',
                        border: activeId === p.id ? '1px solid rgba(0,0,0,0.12)' : '1px solid rgba(0,0,0,0.05)',
                        cursor: 'pointer', transition: 'background 0.15s, border-color 0.15s',
                        opacity: p.available ? 1 : 0.5,
                      }}
                        onMouseEnter={e => { if (activeId !== p.id) e.currentTarget.style.background = 'rgba(0,0,0,0.05)'; }}
                        onMouseLeave={e => { if (activeId !== p.id) e.currentTarget.style.background = 'rgba(0,0,0,0.02)'; }}
                      >
                        <div style={{ fontSize: 15, fontWeight: p.available ? 700 : 400, color: '#1c1c18', letterSpacing: '-0.015em', lineHeight: 1.2, marginBottom: 6 }}>{p.title}</div>
                        <div style={{ fontSize: 11, color: '#71717a' }}>
                          {p.available ? p.tags.join(' · ') : 'Coming soon'}
                        </div>
                      </button>
                    ))}
                  </div>

                </div>
              </div>

              {/* ── About Me ── */}
              <a href="about.html" className="anim-up-2" style={{ ...cardBase, minHeight: 400 }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 16px 48px rgba(0,0,0,0.08)'; e.currentTarget.querySelector('.card-glow2').style.opacity = 1; }}
                onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; e.currentTarget.querySelector('.card-glow2').style.opacity = 0; }}
              >
                <span style={labelStyle}>About Me</span>
                <div className="card-glow2" style={{ position: 'absolute', inset: 0, borderRadius: 18, pointerEvents: 'none', background: 'linear-gradient(180deg, #f6f3ed 59.7%, rgba(247,212,205,0.86) 76.8%, rgba(249,110,100,0.75) 89.8%, rgba(249,12,0,0.75) 99.9%)', opacity: 0, transition: 'opacity 0.4s' }} />
              </a>

              {/* ── Contact ── */}
              <a href="contact.html" className="anim-up-3" style={{ ...cardBase, minHeight: 400 }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 16px 48px rgba(0,0,0,0.08)'; e.currentTarget.querySelector('.card-glow3').style.opacity = 1; }}
                onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; e.currentTarget.querySelector('.card-glow3').style.opacity = 0; }}
              >
                <span style={labelStyle}>Contact</span>
                <div className="card-glow3" style={{ position: 'absolute', inset: 0, borderRadius: 18, pointerEvents: 'none', background: 'radial-gradient(circle at 50% 50%, rgba(255,221,152,1) 0%, rgba(251,232,194,1) 50%, #f6f3ed 100%)', opacity: 0, transition: 'opacity 0.4s' }} />
              </a>

            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Case study overlay — iframe loaded lazily on first expand -->
  <div id="cs-panel">
    <iframe id="cs-iframe" src="" title="Energy Ave. case study" allowtransparency="true"></iframe>
  </div>

  <script>
    (function() {

      // ── Page enter fade ─────────────────────────────────────
      document.body.classList.add('page-entering');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { document.body.classList.remove('page-entering'); });
      });

      // ── Projects card expand/collapse ───────────────────────
      // React (Babel) renders asynchronously, so we poll until
      // the card element exists before attaching listeners.
      function setupExpand() {
        var card     = document.getElementById('card-projects');
        var closeBtn = document.getElementById('projects-close');
        if (!card || !closeBtn) { requestAnimationFrame(setupExpand); return; }

        var isExpanded  = false;
        var savedRect   = null;
        var savedStyle  = {};
        var expandedDims = null; // PAD / panelW / panelH stored for collapse

        function getSiblings() {
          return document.querySelectorAll('.anim-fade, .anim-up-2, .anim-up-3');
        }

        function expand() {
          if (isExpanded) return;
          isExpanded = true;
          gsap.killTweensOf(card);

          // 1. Reset any hover lift so getBoundingClientRect is accurate
          savedStyle.transition = card.style.transition;
          savedStyle.cursor     = card.style.cursor;
          gsap.set(card, { clearProps: 'transform,boxShadow' });
          savedRect = card.getBoundingClientRect();

          // 2. Kill siblings instantly — clear any CSS animation first so
          //    fill-mode:both cannot fight the opacity override, then set
          //    opacity to 0 in the same frame as the snap.
          getSiblings().forEach(function(el) {
            el.style.animation    = 'none';
            el.style.pointerEvents = 'none';
          });
          gsap.set(Array.from(getSiblings()), { opacity: 0 });

          // 3. Snap to position:fixed at the card's exact current coords (invisible)
          card.style.transition = 'none';
          card.style.position   = 'fixed';
          card.style.top        = savedRect.top    + 'px';
          card.style.left       = savedRect.left   + 'px';
          card.style.width      = savedRect.width  + 'px';
          card.style.height     = savedRect.height + 'px';
          card.style.margin     = '0';
          card.style.zIndex     = '200';
          card.style.cursor     = 'default';

          // 4. Target dimensions
          var PAD    = 24;
          var panelW = Math.round(Math.min(320, window.innerWidth * 0.25));
          var panelH = window.innerHeight - PAD * 2;
          expandedDims = { PAD: PAD, panelW: panelW, panelH: panelH };

          // 5. Compute the transform that moves the card from its current
          //    snapped position to the target panel position.
          //    Using transform (not top/left/width/height) keeps all work
          //    on the compositor thread — no layout reflow per frame.
          var dx = PAD - savedRect.left;
          var dy = PAD - savedRect.top;
          var sx = panelW / savedRect.width;
          var sy = panelH / savedRect.height;

          // 6. Add class now — collapsed label fades out immediately,
          //    panel content fades in after a CSS delay (0.52 s)
          card.classList.add('card-expanded');

          // 7. Pre-load the iframe in parallel with the animation
          var iframe = document.getElementById('cs-iframe');
          var iframeLeft = PAD + panelW + PAD;
          iframe.style.left  = iframeLeft + 'px';
          iframe.style.width = (window.innerWidth - iframeLeft) + 'px';
          if (!iframe.getAttribute('data-loaded')) {
            iframe.src = 'Energy Ave.html?embed';
            iframe.setAttribute('data-loaded', '1');
          }

          // 8. Animate with transform — smooth expo ease, compositor only
          gsap.fromTo(card,
            { x: 0, y: 0, scaleX: 1, scaleY: 1, transformOrigin: '0px 0px' },
            {
              x: dx, y: dy, scaleX: sx, scaleY: sy,
              duration: 0.6, ease: 'expo.inOut',
              onComplete: function() {
                // Swap the transform for real pixel dimensions in the same frame
                card.style.left   = PAD    + 'px';
                card.style.top    = PAD    + 'px';
                card.style.width  = panelW + 'px';
                card.style.height = panelH + 'px';
                gsap.set(card, { clearProps: 'transform,x,y,scaleX,scaleY' });
                card.style.boxShadow = '0 8px 40px rgba(0,0,0,0.1)';
                document.body.style.overflow = 'hidden';
                document.getElementById('cs-panel').classList.add('cs-visible');
              }
            }
          );
        }

        function collapse() {
          if (!isExpanded) return;
          isExpanded = false;
          if (!expandedDims) return;
          gsap.killTweensOf(card);

          var PAD    = expandedDims.PAD;
          var panelW = expandedDims.panelW;
          var panelH = expandedDims.panelH;

          // 1. Hide the iframe panel immediately
          document.getElementById('cs-panel').classList.remove('cs-visible');
          card.style.boxShadow = '';

          // 2. Ensure the card is sitting at its true expanded pixel dimensions
          //    (clear any leftover transform from expand, apply real coords)
          gsap.set(card, { clearProps: 'transform,x,y,scaleX,scaleY' });
          card.style.left   = PAD    + 'px';
          card.style.top    = PAD    + 'px';
          card.style.width  = panelW + 'px';
          card.style.height = panelH + 'px';

          // 3. Reverse transform — card animates back to its grid position.
          //    We keep card-expanded active during the animation so the
          //    navigator content stays visible while the shape shrinks,
          //    and only swap back to the "Projects" label at the very end.
          var dx = savedRect.left - PAD;
          var dy = savedRect.top  - PAD;
          var sx = savedRect.width  / panelW;
          var sy = savedRect.height / panelH;

          gsap.fromTo(card,
            { x: 0, y: 0, scaleX: 1, scaleY: 1, transformOrigin: '0px 0px' },
            {
              x: dx, y: dy, scaleX: sx, scaleY: sy,
              duration: 0.5, ease: 'expo.inOut',
              onComplete: function() {
                // Swap back to relative flow — card snaps to its natural grid slot
                card.classList.remove('card-expanded');
                gsap.set(card, { clearProps: 'transform,x,y,scaleX,scaleY' });
                card.style.position   = '';
                card.style.top        = '';
                card.style.left       = '';
                card.style.width      = '';
                card.style.height     = '';
                card.style.margin     = '';
                card.style.zIndex     = '';
                card.style.transition = savedStyle.transition;
                card.style.cursor     = savedStyle.cursor || '';
                document.body.style.overflow = '';

                getSiblings().forEach(function(el) {
                  el.style.animation    = '';
                  el.style.pointerEvents = '';
                });
                gsap.to(Array.from(getSiblings()), {
                  opacity: 1, duration: 0.35, ease: 'power2.out'
                });
              }
            }
          );
        }

        card.addEventListener('click', function() { if (!isExpanded) expand(); });
        closeBtn.addEventListener('click', function(e) { e.stopPropagation(); collapse(); });
      }

      setupExpand();

      // ── Page-leave fade for all anchor navigation ───────────
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function() { window.location.href = href; }, 300);
      });

    })();
  </script>

</body>
</html>
